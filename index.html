<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>好洺餐飲事業有限公司 — 生產管理系統 v2.1.0</title>
<style>
/* ══════════════════════════════════════════════════════
   好洺餐飲 生產管理系統 — Warm Kitchen Theme v1.0
   溫暖專業 · 高對比 · 易讀 · 快速上手
   ══════════════════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
html{font-size:clamp(14px,1.4vw,16.5px)}
:root{
  --pri:#0A6847;--pri-d:#064535;--pri-l:#E8F5EE;--pri-bg:#F0FAF5;
  --amber:#9A6210;--amber-d:#7A4D0B;--amber-l:#FFF8ED;--amber-m:#F0C060;--amber-bg:#FFFDF7;
  --teal:#0A5A46;--teal-d:#064535;--teal-l:#DFF5EC;
  --g50:#FAFAF8;--g100:#F5F3EF;--g200:#E8E6E0;--g300:#B0AEA6;--g400:#706E68;--g500:#555350;--g600:#3E3D3A;--g700:#2C2C2A;--g800:#1E1E1C;
  --red:#C02828;--red-l:#FEF0F0;--red-d:#8C1A1A;
  --blue:#1460A8;--blue-l:#EDF4FC;
  --card:#FFFFFF;--bg:#F0EDE7;--bg2:#E8E5DF;
  --brd:1px solid #D4D2CC;--brd-l:1px solid #E8E6E0;--r:12px;--r-sm:8px;--r-lg:16px;
  --shadow-sm:0 1px 4px rgba(0,0,0,.06);--shadow-md:0 4px 16px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.14);
  --font:'Noto Sans TC','PingFang TC','Microsoft JhengHei',-apple-system,sans-serif
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);font-size:1rem;background:var(--bg);color:var(--g800);min-height:100vh;line-height:1.65;letter-spacing:.02em;-webkit-font-smoothing:antialiased}

/* ── Top Bar ── */
#topbar{background:linear-gradient(180deg,#1A1A18 0%,#252523 100%);color:#F3F1EB;position:sticky;top:0;z-index:999;box-shadow:0 2px 16px rgba(0,0,0,.3)}
#topbar-row1{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo{font-size:1.08rem;font-weight:700;white-space:nowrap;display:flex;align-items:center;gap:10px;letter-spacing:.04em;cursor:pointer}
.logo-dot{width:10px;height:10px;background:#D4950F;border-radius:50%;box-shadow:0 0 8px rgba(212,149,15,.45)}
#topbar-row2{display:flex;align-items:center;padding:4px 16px 6px}
#nav-bar{display:flex;gap:3px;flex-wrap:wrap;flex:1;padding:2px 0;-webkit-overflow-scrolling:touch}
.nav-btn{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.68);padding:6px 12px;cursor:pointer;font-size:0.8rem;font-family:var(--font);transition:all .2s;white-space:nowrap;border-radius:var(--r-sm);font-weight:500;letter-spacing:.02em;margin:1px 0}
.nav-btn:hover{color:#fff;background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2);transform:translateY(-1px)}
.nav-btn.active{color:#FFF;background:rgba(212,149,15,.2);border-color:rgba(212,149,15,.6);font-weight:700;box-shadow:0 0 8px rgba(212,149,15,.15)}
.nav-divider{color:rgba(255,255,255,.12);padding:0 3px;align-self:center;user-select:none;flex-shrink:0;font-size:0.65rem}
#topbar-right{margin-left:auto;font-size:0.82rem;color:rgba(255,255,255,.6);flex-shrink:0;padding-left:12px;font-weight:500}

/* ── Layout ── */
#cost-section{display:block}#order-section{display:none}
#cost-content{padding:20px 28px;max-width:1440px;margin:0 auto}
.page-title{font-size:1.25rem;font-weight:700;color:var(--g800);margin-bottom:20px;letter-spacing:.03em;line-height:1.3}

/* ── Cards ── */
.card{background:var(--card);border-radius:var(--r);border:var(--brd-l);padding:20px 22px;margin-bottom:14px;box-shadow:var(--shadow-sm);transition:box-shadow .2s}
.card:hover{box-shadow:var(--shadow-md)}
.card-title{font-size:0.92rem;font-weight:700;color:var(--g700);margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid var(--g100);letter-spacing:.02em;display:flex;align-items:center;gap:6px}

/* ── Grids ── */
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}

/* ── Metrics ── */
.metric{background:var(--g50);border-radius:var(--r-sm);padding:14px 16px;border:var(--brd-l);text-align:center;transition:transform .15s}
.metric:hover{transform:translateY(-2px)}
.metric-label{font-size:0.75rem;color:var(--g400);font-weight:500;margin-bottom:6px;text-transform:none;letter-spacing:.03em}
.metric-val{font-size:1.55rem;font-weight:700;color:var(--teal);line-height:1.2}
.metric-sub{font-size:0.72rem;color:var(--g300);margin-top:3px}

/* ── Tables ── */
.tbl{width:100%;border-collapse:separate;border-spacing:0;font-size:0.88rem}
.tbl th{background:var(--g100);padding:10px 14px;text-align:left;font-weight:600;color:var(--g500);font-size:0.8rem;letter-spacing:.04em;text-transform:none;border-bottom:2px solid var(--g200);position:sticky;top:0;z-index:1}
.tbl td{padding:10px 14px;border-bottom:var(--brd-l);color:var(--g700);vertical-align:middle;line-height:1.5}
.tbl tbody tr{transition:background .15s}
.tbl tbody tr:hover{background:var(--g50)}
.tbl tbody tr:nth-child(even){background:rgba(245,243,239,.5)}
.tbl tbody tr:nth-child(even):hover{background:var(--g50)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:var(--r-sm);padding:10px 20px;font-size:0.9rem;cursor:pointer;font-family:var(--font);font-weight:600;transition:all .2s;letter-spacing:.02em;line-height:1.3}
.btn:active{transform:scale(.97)}
.btn-primary,.btn-pri{background:var(--pri);color:#fff;box-shadow:0 2px 6px rgba(10,104,71,.2)}
.btn-primary:hover,.btn-pri:hover{background:var(--pri-d);box-shadow:0 4px 12px rgba(10,104,71,.25)}
.btn-outline{background:var(--card);border:1.5px solid var(--g200);color:var(--g600)}
.btn-outline:hover{border-color:var(--g300);background:var(--g50);color:var(--g800)}
.btn-danger{background:var(--red);color:#fff;box-shadow:0 2px 6px rgba(192,40,40,.2)}
.btn-danger:hover{background:var(--red-d)}
.btn-success{background:var(--pri);color:#fff}.btn-success:hover{background:var(--pri-d)}
.btn-sm{padding:6px 14px;font-size:0.82rem;font-weight:600;border-radius:6px}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:0.75rem;font-weight:600;letter-spacing:.02em}
.badge-green{background:var(--pri-l);color:var(--pri)}
.badge-red{background:var(--red-l);color:var(--red)}
.badge-warn{background:var(--amber-l);color:var(--amber)}
.badge-blue{background:var(--blue-l);color:var(--blue)}
.badge-gray{background:var(--g100);color:var(--g400)}

/* ── Forms ── */
.fg{margin-bottom:12px}
.fg label{display:block;font-size:0.82rem;font-weight:600;color:var(--g500);margin-bottom:5px;letter-spacing:.02em}
.fg input,.fg select,.fg textarea{width:100%;border:1.5px solid var(--g200);border-radius:var(--r-sm);padding:10px 14px;font-size:0.92rem;font-family:var(--font);background:var(--card);color:var(--g800);transition:all .2s;outline:none;line-height:1.4}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--pri);box-shadow:0 0 0 3px rgba(10,104,71,.1);background:#fff}
.fg input::placeholder{color:var(--g300);font-weight:400}
.form-row{display:grid;gap:12px;margin-bottom:4px}
.form-row.c2{grid-template-columns:1fr 1fr}
.form-row.c3{grid-template-columns:1fr 1fr 1fr}
.form-row.c4{grid-template-columns:repeat(4,1fr)}
.form-row.c5{grid-template-columns:repeat(5,1fr)}

/* ── Modal ── */
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(2px)}
.modal-box{background:var(--card);border-radius:var(--r-lg);width:auto;min-width:460px;max-width:95vw;max-height:85vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modalIn .2s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal-title{font-size:1.05rem;font-weight:700;padding:18px 24px;border-bottom:2px solid var(--g100);color:var(--g800);display:flex;align-items:center;gap:8px;position:sticky;top:0;background:var(--card);z-index:1;border-radius:var(--r-lg) var(--r-lg) 0 0}
.modal-body{padding:20px 24px}
.save-btns{display:flex;gap:10px;justify-content:flex-end;padding:16px 24px;border-top:var(--brd-l);background:var(--g50);border-radius:0 0 var(--r-lg) var(--r-lg)}

/* ── Toast ── */
.toast-wrap{position:fixed;top:80px;right:24px;z-index:9000}
.toast-item{background:var(--g800);color:#fff;padding:12px 22px;border-radius:var(--r);font-size:0.9rem;font-weight:500;box-shadow:var(--shadow-lg);animation:toastIn .3s ease;margin-bottom:8px}
@keyframes toastIn{from{opacity:0;transform:translateX(40px)}to{opacity:1;transform:translateX(0)}}

/* ── Tips / Warnings ── */
.tip{background:var(--amber-l);border-left:4px solid var(--amber);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:10px 16px;font-size:0.86rem;color:var(--amber-d);margin-bottom:14px;line-height:1.6}
.warn-box{background:var(--red-l);border-left:4px solid var(--red);border-radius:0 var(--r-sm) var(--r-sm) 0;padding:10px 16px;font-size:0.86rem;color:var(--red-d);margin-bottom:14px;line-height:1.6}

/* ── SOP ── */
.sop-toggle{background:var(--pri-l);border:1.5px solid rgba(10,104,71,.15);border-radius:var(--r-sm);padding:10px 16px;cursor:pointer;font-size:0.86rem;color:var(--pri);font-weight:600;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center;transition:all .2s}
.sop-toggle:hover{background:var(--pri-bg);border-color:rgba(10,104,71,.25)}
.sop-content{background:var(--card);border:var(--brd-l);border-radius:0 0 var(--r-sm) var(--r-sm);padding:16px 20px;margin-top:-14px;margin-bottom:14px;font-size:0.86rem;line-height:1.7}
.sop-flow{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.sop-step{background:var(--pri-l);color:var(--pri);padding:4px 12px;border-radius:20px;font-size:0.78rem;font-weight:600}
.sop-arrow{color:var(--g300);font-size:0.7rem}
.sop-section-title{font-weight:700;color:var(--g700);margin:10px 0 6px;font-size:0.88rem}
.sop-steps{padding-left:20px;color:var(--g500);margin-bottom:8px}
.sop-steps li{margin-bottom:4px;line-height:1.6}
.sop-tip{background:var(--amber-l);border-radius:6px;padding:8px 12px;font-size:0.82rem;color:var(--amber-d);margin-top:6px}
.sop-warn{background:var(--red-l);border-radius:6px;padding:8px 12px;font-size:0.82rem;color:var(--red-d);margin-top:6px}

/* ── Recipe ── */
.recipe-list{border-right:var(--brd);overflow-y:auto;max-height:70vh}
.recipe-item{padding:10px 14px;cursor:pointer;border-bottom:var(--brd-l);transition:background .15s;font-size:0.88rem}
.recipe-item:hover{background:var(--g50)}
.recipe-item.active{background:var(--pri-l);border-left:3px solid var(--pri)}
.recipe-detail{padding:16px 20px;overflow-y:auto;max-height:70vh}
.recipe-ing-row{display:grid;grid-template-columns:2fr 80px 60px 90px 36px;gap:6px;align-items:center;padding:6px 0;border-bottom:var(--brd-l);font-size:0.88rem}

/* ── Action Bar (叫貨表) ── */
.action-bar{background:var(--card);padding:14px 24px;border-bottom:var(--brd);display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.tab-nav{display:flex;gap:2px;overflow-x:auto;padding-bottom:4px}
.tab-nav button{padding:10px 18px;border:none;background:transparent;color:var(--g400);font-weight:600;cursor:pointer;font-family:var(--font);font-size:0.88rem;border-bottom:2.5px solid transparent;transition:.2s;white-space:nowrap}
.tab-nav button.active{color:var(--pri);border-bottom-color:var(--pri)}
.tab-nav button:hover{color:var(--g700)}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--g300)}

/* ── Print ── */
@media print{#topbar,.nav-btn,.btn,.sop-toggle{display:none!important}body{background:#fff}.card{box-shadow:none;border:1px solid #ddd}}

/* ── RWD 480px ── */
@media(max-width:480px){
  html{font-size:clamp(13px,4vw,15px)}
  .grid4,.grid3{grid-template-columns:1fr 1fr}
  .grid2{grid-template-columns:1fr}
  .form-row.c4,.form-row.c5,.form-row.c3{grid-template-columns:1fr 1fr}
  .form-row.c2{grid-template-columns:1fr}
  #topbar-row1{padding:6px 12px}
  #topbar-row2{padding:2px 8px 4px}
  .logo{font-size:0.92rem}
  .nav-btn{padding:4px 8px;font-size:0.76rem}
  .action-bar{padding:10px 14px;flex-direction:column;gap:10px}
  .btns{width:100%;justify-content:center;flex-wrap:wrap}
  .card{padding:14px 16px;border-radius:var(--r-sm)}
  .page-title{font-size:1.05rem}
  .modal-title{font-size:1rem;padding:14px 16px}
  .modal-body{padding:14px 16px}
  .tbl th,.tbl td{padding:7px 10px;font-size:0.82rem}
  .metric-val{font-size:1.3rem}
  .metric{padding:10px 12px}
  .recipe-ing-row{grid-template-columns:1fr 70px 55px 80px 30px;gap:4px}
  #cost-content{padding:12px}
  .btn{padding:8px 14px;font-size:0.86rem}
  .save-btns{padding:12px 16px}
}
/* ── RWD 360px ── */
@media(max-width:360px){
  .grid4,.grid3,.grid2{grid-template-columns:1fr}
  .form-row.c4,.form-row.c5,.form-row.c3,.form-row.c2{grid-template-columns:1fr}
  .nav-btn{padding:3px 6px;font-size:0.74rem}
  .metric-val{font-size:1.1rem}
}
</style>
</head>
<body>
<div id="topbar">
  <div id="topbar-row1">
    <div class="logo" style="cursor:pointer" onclick="showVersionInfo()"><span class="logo-dot"></span><span>好洺餐飲事業有限公司 生產管理系統</span><span style="font-size:0.65rem;color:rgba(255,255,255,.4);margin-left:6px;font-weight:400">v2.0.0</span></div>
    <div style="display:flex;align-items:center;gap:6px"><button id="undo-btn" onclick="doUndo()" title="上一步 (Ctrl+Z)" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:0.88rem;font-family:inherit;transition:.2s;opacity:.35">↩️ 上一步</button><button id="redo-btn" onclick="doRedo()" title="下一步 (Ctrl+Y)" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:0.88rem;font-family:inherit;transition:.2s;opacity:.35">↪️ 下一步</button><span id="undo-count" style="font-size:0.72rem;color:rgba(255,255,255,.4);min-width:32px;text-align:center"></span><div id="topbar-right"></div></div>

  <div id="topbar-row2"><div id="nav-bar"><button data-cp="dash" class="nav-btn active" onclick="goPage('dash')">📊 儀表板</button><span class="nav-divider">│</span><button data-cp="sup" class="nav-btn" onclick="goPage('sup')">🏪 供應商</button><button data-cp="contract" class="nav-btn" onclick="goPage('contract')">📄 合約</button><button data-cp="po" class="nav-btn" onclick="goPage('po')">📋 採購單</button><button data-cp="order" class="nav-btn" onclick="goPage('order')">📋 叫/出貨表</button><button data-cp="buy" class="nav-btn" onclick="goPage('buy')">🛍️ 進貨記錄</button><span class="nav-divider">│</span><button data-cp="batch" class="nav-btn" onclick="goPage('batch')">📅 效期管理</button><button data-cp="ing" class="nav-btn" onclick="goPage('ing')">🥬 食材庫存</button><button data-cp="store-inv" class="nav-btn" onclick="goPage('store-inv')">🏬 門市庫存</button><button data-cp="transfer" class="nav-btn" onclick="goPage('transfer')">🔄 調撥</button><span class="nav-divider">│</span><button data-cp="recipe" class="nav-btn" onclick="goPage('recipe')">📋 配方卡</button><button data-cp="prod" class="nav-btn" onclick="goPage('prod')">🏭 生產扣料</button><button data-cp="internal" class="nav-btn" onclick="goPage('internal')">🏭→🏪 轉售</button><button data-cp="label" class="nav-btn" onclick="goPage('label')">🏷️ 標籤</button><span class="nav-divider">│</span><button data-cp="menu" class="nav-btn" onclick="goPage('menu')">🍽️ 菜單成本</button><button data-cp="allergen" class="nav-btn" onclick="goPage('allergen')">⚠️ 過敏原</button><button data-cp="waste" class="nav-btn" onclick="goPage('waste')">♻️ 損耗管理</button><button data-cp="ap" class="nav-btn" onclick="goPage('ap')">💳 應付帳款</button><button data-cp="ar" class="nav-btn" onclick="goPage('ar')">💰 應收帳款</button><button data-cp="budget" class="nav-btn" onclick="goPage('budget')">💹 預算/KPI</button><button data-cp="count" class="nav-btn" onclick="goPage('count')">📋 盤點</button><button data-cp="rtn" class="nav-btn" onclick="goPage('rtn')">↩️ 退貨</button><button data-cp="tax" class="nav-btn" onclick="goPage('tax')">🧾 稅務</button><button data-cp="cost-analysis" class="nav-btn" onclick="goPage('cost-analysis')">📈 成本分析</button><button data-cp="wo" class="nav-btn" onclick="goPage('wo')">📝 工單</button><button data-cp="customer" class="nav-btn" onclick="goPage('customer')">👥 客戶</button><button data-cp="asset" class="nav-btn" onclick="goPage('asset')">🏗️ 資產</button><button data-cp="sales" class="nav-btn" onclick="goPage('sales')">🛒 銷售</button><span class="nav-divider">│</span><button data-cp="qc" class="nav-btn" onclick="goPage('qc')">🔍 品管</button><button data-cp="trace" class="nav-btn" onclick="goPage('trace')">🔄 追溯</button><button data-cp="schedule" class="nav-btn" onclick="goPage('schedule')">📅 排程</button><button data-cp="equip" class="nav-btn" onclick="goPage('equip')">🔧 設備</button><button data-cp="alert-center" class="nav-btn" onclick="goPage('alert-center')">🔔 警示</button><span class="nav-divider">│</span><button data-cp="users" class="nav-btn" onclick="goPage('users')">👤 帳號</button><button data-cp="cloud" class="nav-btn" onclick="goPage('cloud')">☁️ 雲端</button><button data-cp="ref" class="nav-btn" onclick="goPage('ref')">⚙️ 設定</button></div></div>
</div>
<div id="cost-section"><div id="cost-content"></div></div>
<div id="order-section">
  <div class="tab-nav" id="tabNav">
    <button class="tab-btn active" onclick="switchTab(0)">義早食材叫貨</button>
    <button class="tab-btn" onclick="switchTab(1)">義早包材叫貨</button>
    <button class="tab-btn" onclick="switchTab(2)">咕咕食材叫貨</button>
    <button class="tab-btn" onclick="switchTab(3)">咕咕包材叫貨</button>

let _saveTimer=null;
var _fbSaveTimer=null;
function saveState(){
  pushUndo();
  // 1. localStorage 快取（即時）
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(function(){
    try{localStorage.setItem(COST_KEY,JSON.stringify(state))}catch(e){}
  },300);
  // 2. Firebase 主資料庫（2秒防抖，批次寫入）
  clearTimeout(_fbSaveTimer);
  _fbSaveTimer=setTimeout(function(){
    _saveToFirebase();
  },2000);
}
function _saveToFirebase(){
  if(!initFirebaseSDK())return;
  if(_cloudSyncing)return;
  _cloudSyncing=true;
  var stateClone=JSON.parse(JSON.stringify(state));
  delete stateClone.cloudConfig;
  
  // 主資料存到 erp/state/main
  _fbDb.collection('erp').doc('state').set({
    data:stateClone,
    updated_at:firebase.firestore.FieldValue.serverTimestamp(),
    device:state.cloudConfig.deviceName||'主系統'
  }).then(function(){
    _cloudSyncing=false;
    state.cloudConfig.lastSync=new Date().toISOString();
    try{localStorage.setItem(COST_KEY,JSON.stringify(state))}catch(e){}
    // 同步寫入共用區（給財會系統讀取）
    _writeSharedData(stateClone);
  }).catch(function(e){
    _cloudSyncing=false;
    console.error('Firestore save error:',e);
  });
}

// 寫入 shared/ 共用區 — 財會系統可直接讀取
function _writeSharedData(data){
  if(!_fbDb)return;
  var now=new Date();
  var mon=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  
  // 轉售出貨摘要
  var orders=(data.internalOrders||[]).filter(function(o){return o.date&&o.date.startsWith(mon.replace(now.getFullYear(),now.getFullYear()))&&o.status!=='已取消'});
  if(orders.length){
    var salesByStore={};
    orders.forEach(function(o){
      if(!salesByStore[o.store])salesByStore[o.store]={items:[],totalCost:0,totalSell:0};
      salesByStore[o.store].totalCost+=o.totalCost||0;
      salesByStore[o.store].totalSell+=o.totalAmt||0;
      (o.items||[]).forEach(function(it){salesByStore[o.store].items.push({name:it.name,qty:it.qty,cost:it.subtotalCost,sell:it.subtotalSell,date:o.date})});
    });
    _fbDb.collection('shared').doc(mon).collection('erp').doc('internal_sales').set({
      data:salesByStore,source:'erp',updated_at:firebase.firestore.FieldValue.serverTimestamp()
    }).catch(function(e){console.log('Shared write error:',e)});
  }
  
  // 進貨摘要
  var buys=(data.buyLog||[]).filter(function(b){return b.date&&b.date.startsWith(mon.replace(now.getFullYear(),now.getFullYear()))});
  if(buys.length){
    _fbDb.collection('shared').doc(mon).collection('erp').doc('purchases').set({
      data:buys,source:'erp',updated_at:firebase.firestore.FieldValue.serverTimestamp()
    }).catch(function(e){console.log('Shared write error:',e)});
  }
  
  // 應付帳款
  var ap=(data.apList||[]).filter(function(a){return a.status==='未付款'});
  if(ap.length){
    _fbDb.collection('shared').doc('current').collection('erp').doc('accounts_payable').set({
      data:ap,source:'erp',updated_at:firebase.firestore.FieldValue.serverTimestamp()
    }).catch(function(e){console.log('Shared write error:',e)});
  }
}

function dv(a,...k){const e=document.createElement('div');if(a){if(a.cls)e.className=a.cls;if(a.style)e.style.cssText=a.style;if(a.id)e.id=a.id;if(a.html)e.innerHTML=a.html}k.filter(Boolean).forEach(c=>e.appendChild(typeof c==='string'?document.createTextNode(c):c));return e}
function el(tag,attrs,...kids){const e=document.createElement(tag);Object.entries(attrs||{}).forEach(([k,v])=>{if(k==='cls')e.className=v;else if(k==='html')e.innerHTML=v;else if(k==='txt')e.textContent=v;else if(k.startsWith('on'))e.addEventListener(k.slice(2),v);else e.setAttribute(k,v)});kids.filter(Boolean).forEach(c=>e.appendChild(typeof c==='string'?document.createTextNode(c):c));return e}

const mH=t=>`<div class="modal-title"><b style="font-size:1.05rem">${t}</b><button class="btn btn-sm btn-outline" onclick="closeModal()">✕</button></div>`;

function sopBox(pageId){const cfg=SOP_DATA[pageId];if(!cfg)return null;const wrap=dv({cls:'sop-box'});const hdr=dv({cls:'sop-header'});hdr.innerHTML=`<div class="sop-header-left">📖 操作說明 SOP<span class="sop-badge">${cfg.badge}</span></div><span class="sop-toggle${_sopOpen[pageId]?' open':''}">▼</span>`;const body=dv({cls:'sop-body'+(_sopOpen[pageId]?' open':'')});if(cfg.flow&&cfg.flow.length){const fr=dv({cls:'sop-flow'});cfg.flow.forEach((step,i)=>{fr.appendChild(dv({cls:'sop-flow-step'},step));if(i<cfg.flow.length-1)fr.appendChild(dv({cls:'sop-flow-arrow'},'→'))});body.appendChild(fr)}const cols=dv({cls:'sop-cols'});(cfg.sections||[]).forEach(sec=>{const sc=dv({cls:'sop-section'});sc.appendChild(dv({cls:'sop-section-title'},sec.title));const ul=el('ul',{cls:'sop-steps'});(sec.steps||[]).forEach((step,i)=>{const li=el('li',{});li.innerHTML=`<span class="sop-num">${i+1}</span><span>${step}</span>`;ul.appendChild(li)});sc.appendChild(ul);if(sec.warn)sc.innerHTML+=`<div class="sop-warn">⚠️ ${sec.warn}</div>`;if(sec.tip)sc.innerHTML+=`<div class="sop-tip">💡 ${sec.tip}</div>`;cols.appendChild(sc)});body.appendChild(cols);wrap.appendChild(hdr);wrap.appendChild(body);hdr.addEventListener('click',()=>{_sopOpen[pageId]=!_sopOpen[pageId];body.classList.toggle('open',_sopOpen[pageId]);hdr.querySelector('.sop-toggle').classList.toggle('open',_sopOpen[pageId])});return wrap}

function renderPage(){const c=$('cost-content');if(!c)return;c.innerHTML='';const renders={dash:renderDash,ing:renderIng,recipe:renderRecipe,menu:renderMenuPage,waste:renderWaste,sup:renderSup,buy:renderBuy,ref:renderRef,'store-inv':renderStoreInv,transfer:renderTransfer,po:renderPO,ap:renderAP,batch:renderBatch,prod:renderProd,allergen:renderAllergen,contract:renderContract,users:renderUsers,label:renderLabel,qc:renderQC,trace:renderTrace,schedule:renderSchedule,equip:renderEquip,budget:renderBudget,'alert-center':renderAlertCenter,ar:renderAR,count:renderCount,rtn:renderReturn,tax:renderTax,'cost-analysis':renderCostAnalysis,wo:renderWorkOrder,customer:renderCustomer,asset:renderAssets,sales:renderSales,internal:renderInternalSales,cloud:renderCloud};const fn=renders[state.page];if(fn){const r=fn();if(r)c.appendChild(r)}else{c.appendChild(dv({cls:'card',style:'text-align:center;padding:40px;color:#706E68'},'此模組開發中...'))}}


function calcCost(r){const mult=r.multiplier||1,im=imap();let tot=0;(r.ings||[]).forEach(ing=>{const inv=im[ing.name];if(!inv)return;const q=ing.qty*mult;tot+=['g','公克','ml','毫升'].includes(ing.unit)?inv.price*q/1000:inv.price*q});return{total:tot,per:tot/((r.perBatch||1)*mult)}}

function calcNut(r){const mult=r.multiplier||1,im=imap();let kc=0,pr=0,ft=0,cb=0,so=0,tw=0;(r.ings||[]).forEach(ing=>{if(ing.unit==='張'||ing.unit==='盒')return;const g=['公斤','公升'].includes(ing.unit)?ing.qty*mult*1000:ing.qty*mult;tw+=g;const inv=im[ing.name];if(!inv)return;kc+=(g/100)*(inv.kcal||0);pr+=(g/100)*(inv.prot||0);ft+=(g/100)*(inv.fat||0);cb+=(g/100)*(inv.carb||0);so+=(g/100)*(inv.sodium||0)});const d=((r.perBatch||1)*(r.multiplier||1)*1000/100)||tw/100||1;return{kcal:kc/d*100,prot:pr/d*100,fat:ft/d*100,carb:cb/d*100,sodium:so/d*100}}

function renderRecipe(){const pg=dv({});var sw=sopBox('recipe');if(sw)pg.appendChild(sw);pg.appendChild(dv({style:'display:flex;justify-content:space-between;align-items:center;margin-bottom:12px'},dv({cls:'page-title',style:'margin:0'},'📋 配方卡管理（'+state.recipes.length+' 份）'),btn('btn btn-primary','＋ 新增配方',()=>openRecipeModal(''))));
const grid=dv({cls:'grid2'});const lc=dv({cls:'card',style:'padding:0;overflow:hidden',id:'recipe-list-card'});
lc.innerHTML='<table class="tbl"><thead><tr><th>代碼</th><th>配方名稱</th><th>分類</th><th>每批成本</th><th style="min-width:110px">操作</th></tr></thead><tbody>'+state.recipes.map(r=>{const rc=calcCost(r);return'<tr class="recipe-row" data-id="'+r.id+'" style="cursor:pointer" onclick="showRecipeDetail(\''+r.id+'\')"><td style="font-family:monospace;font-size:0.78rem;color:#706E68">'+esc(r.code)+'</td><td style="font-weight:600">'+esc(r.name)+'</td><td><span class="badge badge-blue">'+esc(r.cat||'未分類')+'</span></td><td style="color:#0A5A46;font-weight:600">'+CUR()+' '+fmt(rc.per,1)+'</td><td><div style="display:flex;gap:4px"><button class="btn btn-sm btn-outline" onclick="event.stopPropagation();openRecipeModal(\''+r.id+'\')">編輯</button><button class="btn btn-sm btn-danger" onclick="event.stopPropagation();delRecipe(\''+r.id+'\')">刪除</button></div></td></tr>'}).join('')+'</tbody></table>';
grid.appendChild(lc);grid.appendChild(dv({id:'recipe-detail',html:'<div class="card" style="display:flex;align-items:center;justify-content:center;min-height:200px;color:#706E68;font-size:0.92rem">← 點選左側配方卡查看詳情</div>'}));pg.appendChild(grid);return pg}

window.showRecipeDetail=function(id){const rec=state.recipes.find(x=>x.id===id);if(!rec)return;const det=$('recipe-detail');if(!det)return;const im=imap(),rc=calcCost(rec);

window.renderSITable=function(){

var inv=state.storeInv||[];

  if(store&&i.store!==store)return false;if(cat&&i.cat!==cat)return false;
  if(src&&i.sourceType!==src)return false;

  if(st==='ok')return i.stock>i.safety;if(st==='low')return i.stock>0&&i.stock<=i.safety;if(st==='out')return i.stock<=0;return true});

w.innerHTML=h+'</tbody></table></div>'};

window.siSv=function(eid){
var nm=$('si-name');var name=nm?nm.value.trim():'';if(!name){alert('請填入品名');return}

window.siAdjDo=function(id){

var _autoBackupTimer=null;
function scheduleAutoBackup(){clearInterval(_autoBackupTimer);_autoBackupTimer=setInterval(function(){
try{
  var now=new Date();var key='hm_autobackup_'+toDay();
  // 每天第一次自動備份
  if(!localStorage.getItem(key)){
    localStorage.setItem(key,JSON.stringify({ts:now.toISOString(),data:state}));
  }else{
    // 同一天更新備份
    localStorage.setItem(key,JSON.stringify({ts:now.toISOString(),data:state}));
  }
  // 清理超過 14 天的備份
  var old=[];for(var i=0;i<localStorage.length;i++){var k=localStorage.key(i);if(k&&k.startsWith('hm_autobackup_')&&!k.includes('_T'))old.push(k)}
  old.sort();while(old.length>14){localStorage.removeItem(old.shift())}
}catch(e){}},180000)}
scheduleAutoBackup();

    if(userField)userField.focus();
    // 自動填入已記憶的帳密

window.doLogin=function(){
  var un=(document.getElementById('login-user')||{}).value||'';
  var pw=(document.getElementById('login-pass')||{}).value||'';
  var errEl=document.getElementById('login-err');
  if(!un||!pw){if(errEl){errEl.textContent='請輸入帳號和密碼';errEl.style.display='block'}return}
  var user=(state.users||[]).find(function(u){return u.username===un&&u.password===pw&&u.active});
  if(!user){if(errEl){errEl.textContent='帳號或密碼錯誤，或帳號已停用';errEl.style.display='block'}return}
  state.currentUser={id:user.id,username:user.username,name:user.name,role:user.role};
  // 儲存記憶帳密
  try{
    var remUser=document.getElementById('login-remember-user');
    var remPass=document.getElementById('login-remember-pass');
    var memory={};
    if(remUser&&remUser.checked)memory.username=un;
    if(remPass&&remPass.checked)memory.password=pw;
    if(memory.username||memory.password){localStorage.setItem('hm_login_memory',JSON.stringify(memory))}
    else{localStorage.removeItem('hm_login_memory')}
  }catch(e){}
  saveState();
  var overlay=document.getElementById('login-overlay');
  if(overlay)overlay.remove();
  applyPermissions();
  addAudit('登入系統',user.name+' ('+user.role+')');
  saveState();
  renderPage();
  toast('✅ 歡迎，'+user.name);
};

window.doLogout=function(){
  if(!confirm('確定要登出？'))return;
  addAudit('登出系統',(state.currentUser||{}).name||'');
  state.currentUser=null;
  // 登出時保留帳號記憶但清除密碼記憶（安全考量）
  try{
    var saved=JSON.parse(localStorage.getItem('hm_login_memory')||'{}');
    if(saved.username&&!saved.password){/*保留帳號記憶*/}
    else if(saved.username&&saved.password){/*用戶勾選了記住密碼，保留*/}
    // 若未勾選任何記憶則不處理
  }catch(e){}
  saveState();
  showLoginScreen();
};

  var role=(state.currentUser||{}).role||'員工';
  var allowed=DEFAULT_PERMS[role]||DEFAULT_PERMS['員工'];
  var navBtns=document.querySelectorAll('#nav-bar [data-cp]');
  navBtns.forEach(function(btn){
    var cp=btn.getAttribute('data-cp');
    if(cp==='order'){btn.style.display='';return}
    btn.style.display=allowed.indexOf(cp)>=0?'':'none';
  });
  // Update topbar user info

// ══════════════════════════════════════════════════════
// ☁️ 雲端同步（Supabase 即時多人同步）
// ══════════════════════════════════════════════════════
if(!state.cloudConfig)state.cloudConfig={url:'',key:'',enabled:false,lastSync:'',autoSync:false,deviceName:''};
var _supabase=null;
var _cloudSyncing=false;

function initSupabase(){
  var cfg=state.cloudConfig;
  if(!cfg||!cfg.url||!cfg.key||!cfg.enabled)return false;
  try{
    if(typeof window.supabase!=='undefined'&&window.supabase.createClient){
      _supabase=window.supabase.createClient(cfg.url,cfg.key);
      return true;
    }
  }catch(e){console.error('Supabase init error:',e)}
  return false;
}

// 上傳到雲端
window.cloudSave=function(silent){
  if(!initSupabase()){if(!silent)toast('⛔ 雲端未設定或連線失敗','err');return}
  _cloudSyncing=true;
  var deviceName=state.cloudConfig.deviceName||'未命名裝置';
  var payload={
    id:'erp_main',
    data:JSON.parse(JSON.stringify(state)),
    updated_at:new Date().toISOString(),
    device:deviceName
  };
  // Remove circular/sensitive
  delete payload.data.cloudConfig;

  _supabase.from('erp_data').upsert(payload,{onConflict:'id'})
    .then(function(res){
      _cloudSyncing=false;
      if(res.error){
        if(!silent)toast('❌ 雲端儲存失敗：'+res.error.message,'err');
        console.error('Cloud save error:',res.error);
      }else{
        state.cloudConfig.lastSync=new Date().toISOString();
        localStorage.setItem(COST_KEY,JSON.stringify(state));
        if(!silent)toast('✅ 已同步到雲端');
        updateCloudStatus();
      }
    }).catch(function(e){
      _cloudSyncing=false;
      if(!silent)toast('❌ 雲端連線失敗','err');
    });
};

// 從雲端載入
window.cloudLoad=function(silent){
  if(!initSupabase()){if(!silent)toast('⛔ 雲端未設定','err');return}
  _supabase.from('erp_data').select('*').eq('id','erp_main').single()
    .then(function(res){
      if(res.error){
        if(res.error.code==='PGRST116'){if(!silent)toast('☁️ 雲端尚無資料，請先上傳');return}
        if(!silent)toast('❌ 載入失敗：'+res.error.message,'err');return;
      }
      if(!res.data||!res.data.data){if(!silent)toast('☁️ 雲端資料為空');return}
      if(!silent&&!confirm('確定從雲端載入？本機資料將被覆蓋\n\n雲端最後更新：'+(res.data.updated_at||'').slice(0,19).replace('T',' ')+'\n來源裝置：'+(res.data.device||'未知')))return;
      var cloudData=res.data.data;
      var savedConfig=JSON.parse(JSON.stringify(state.cloudConfig));
      Object.keys(cloudData).forEach(function(k){if(k!=='cloudConfig'&&k!=='page')state[k]=cloudData[k]});
      state.cloudConfig=savedConfig;
      state.cloudConfig.lastSync=new Date().toISOString();
      saveState();
      if(!silent)toast('✅ 已從雲端載入');
      renderPage();
    }).catch(function(e){
      if(!silent)toast('❌ 雲端連線失敗','err');
    });
};

// 自動同步（每次 saveState 時觸發）

function updateCloudStatus(){
  var el=document.getElementById('cloud-status');

  var cfg=state.cloudConfig||{};
  if(!cfg.enabled){el.innerHTML='<span style="color:#706E68">⭕ 未啟用</span>';return}
  var last=cfg.lastSync?cfg.lastSync.slice(0,19).replace('T',' '):'從未同步';
  el.innerHTML='<span style="color:#0A5A46">🟢 已連線</span> ｜ 最後同步：'+last;
}

window.saveCloudConfig=function(){
  state.cloudConfig.url=($('cloud-url')?$('cloud-url').value:'').trim().replace(/\/$/,'');
  state.cloudConfig.key=($('cloud-key')?$('cloud-key').value:'').trim();
  state.cloudConfig.deviceName=($('cloud-device')?$('cloud-device').value:'').trim();
  state.cloudConfig.autoSync=$('cloud-auto')?$('cloud-auto').value==='1':false;
  state.cloudConfig.enabled=!!(state.cloudConfig.url&&state.cloudConfig.key);
  saveState();
  if(state.cloudConfig.enabled)initSupabase();
  updateCloudStatus();
  toast('✅ 雲端設定已儲存');
};

window.testCloudConnection=function(){
  if(!initSupabase()){toast('⛔ 請先填入 URL 和 Key 並儲存','err');return}
  var statusEl=$('cloud-op-status');
  if(statusEl)statusEl.innerHTML='🔄 測試連線中...';
  _supabase.from('erp_data').select('id,updated_at,device').limit(1)
    .then(function(res){
      if(res.error){
        if(statusEl)statusEl.innerHTML='<span style="color:#B82525">❌ 連線失敗：'+esc(res.error.message)+'</span>';
        if(res.error.message.includes('relation')){
          if(statusEl)statusEl.innerHTML+='<br><span style="color:#9A6210">⚠️ 資料表尚未建立，請先執行上方的 SQL</span>';
        }
      }else{
        var info=res.data&&res.data.length?'有資料（最後裝置：'+(res.data[0].device||'未知')+' / '+((res.data[0].updated_at||'').slice(0,19))+'）':'資料表存在但尚無資料';
        if(statusEl)statusEl.innerHTML='<span style="color:#0A5A46">✅ 連線成功！'+info+'</span>';
        toast('✅ 雲端連線成功');
      }
    }).catch(function(e){
      if(statusEl)statusEl.innerHTML='<span style="color:#B82525">❌ 連線錯誤：'+esc(e.message||'未知錯誤')+'</span>';
    });
};

// --- Firebase ---
// Firebase SDK 初始化
var _fbApp=null;var _fbDb=null;
function initFirebaseSDK(){
  if(_fbDb)return true;
  var cfg=state.cloudConfig;
  if(!cfg||!cfg.fbApiKey||!cfg.fbProjectId)return false;
  try{
    var fbConfig={apiKey:cfg.fbApiKey,authDomain:cfg.fbAuthDomain||'',projectId:cfg.fbProjectId,storageBucket:cfg.fbStorageBucket||'',messagingSenderId:cfg.fbMessagingSenderId||'',appId:cfg.fbAppId||''};
    if(!firebase.apps.length){_fbApp=firebase.initializeApp(fbConfig)}else{_fbApp=firebase.apps[0]}
    _fbDb=firebase.firestore();
    _fbDb.settings&&_fbDb.settings({cacheSizeBytes:firebase.firestore.CACHE_SIZE_UNLIMITED});
    try{_fbDb.enablePersistence({synchronizeTabs:true})}catch(e){}
    return true;
  }catch(e){console.error('Firebase SDK init error:',e);return false}
}

window.firebaseSave=function(silent){
  if(!initFirebaseSDK()){if(!silent)toast('⛔ Firebase 未設定或初始化失敗','err');return}
  var stateClone=JSON.parse(JSON.stringify(state));
  delete stateClone.cloudConfig;
  _fbDb.collection('erp').doc('state').set({
    data:stateClone,
    updated_at:firebase.firestore.FieldValue.serverTimestamp(),
    device:state.cloudConfig.deviceName||'未命名'
  }).then(function(){
    state.cloudConfig.lastSync=new Date().toISOString();localStorage.setItem(COST_KEY,JSON.stringify(state));
    if(!silent)toast('✅ 已同步到 Firestore');updateCloudStatus();
    _writeSharedData(stateClone);
  }).catch(function(e){if(!silent)toast('❌ Firestore 儲存失敗：'+e.message,'err')});
};

window.firebaseLoad=function(silent){
  if(!initFirebaseSDK()){if(!silent)toast('⛔ Firebase 未設定','err');return}
  _fbDb.collection('erp').doc('state').get()
    .then(function(doc){
      if(!doc.exists||!doc.data()||!doc.data().data){if(!silent)toast('☁️ Firestore 尚無資料');return}
      var res=doc.data();
      var ts=res.updated_at?res.updated_at.toDate().toISOString().slice(0,19).replace('T',' '):'未知';
      if(!silent&&!confirm('確定從雲端載入？本機資料將被覆蓋\n\n最後更新：'+ts+'\n來源裝置：'+(res.device||'未知')))return;
      var saved=JSON.parse(JSON.stringify(state.cloudConfig));
      Object.keys(res.data).forEach(function(k){if(k!=='cloudConfig'&&k!=='page')state[k]=res.data[k]});
      state.cloudConfig=saved;state.cloudConfig.lastSync=new Date().toISOString();
      saveState();if(!silent)toast('✅ 已從 Firestore 載入');renderPage();
    }).catch(function(e){if(!silent)toast('❌ Firestore 載入失敗：'+e.message,'err')});
};

// --- JSONBin.io ---
window.jsonbinSave=function(silent){
  var cfg=state.cloudConfig;if(!cfg||cfg.provider!=='jsonbin'||!cfg.jbKey)return;
  var payload={data:JSON.parse(JSON.stringify(state)),updated_at:new Date().toISOString(),device:cfg.deviceName||'未命名'};
  delete payload.data.cloudConfig;
  var headers={'Content-Type':'application/json','X-Master-Key':cfg.jbKey};
  var url=cfg.jbBinId?'https://api.jsonbin.io/v3/b/'+cfg.jbBinId:'https://api.jsonbin.io/v3/b';
  var method=cfg.jbBinId?'PUT':'POST';
  if(!cfg.jbBinId)headers['X-Bin-Name']='haomin-system';
  fetch(url,{method:method,headers:headers,body:JSON.stringify(payload)})
    .then(function(r){return r.json()}).then(function(res){
      if(res.metadata&&res.metadata.id&&!cfg.jbBinId){state.cloudConfig.jbBinId=res.metadata.id}
      state.cloudConfig.lastSync=new Date().toISOString();localStorage.setItem(COST_KEY,JSON.stringify(state));
      if(!silent)toast('✅ 已同步到 JSONBin');updateCloudStatus();
    }).catch(function(e){if(!silent)toast('❌ JSONBin 儲存失敗','err')});
};

window.jsonbinLoad=function(silent){
  var cfg=state.cloudConfig;if(!cfg||!cfg.jbKey||!cfg.jbBinId)return;
  fetch('https://api.jsonbin.io/v3/b/'+cfg.jbBinId+'/latest',{headers:{'X-Master-Key':cfg.jbKey}})
    .then(function(r){return r.json()}).then(function(res){
      var d=res.record||res;if(!d||!d.data){if(!silent)toast('☁️ JSONBin 尚無資料');return}
      if(!silent&&!confirm('確定從 JSONBin 載入？'))return;
      var saved=JSON.parse(JSON.stringify(state.cloudConfig));
      Object.keys(d.data).forEach(function(k){if(k!=='cloudConfig'&&k!=='page')state[k]=d.data[k]});
      state.cloudConfig=saved;state.cloudConfig.lastSync=new Date().toISOString();
      saveState();if(!silent)toast('✅ 已從 JSONBin 載入');renderPage();
    }).catch(function(e){if(!silent)toast('❌ JSONBin 連線失敗','err')});
};

window.saveCloudConfigMulti=function(){
  var cfg=state.cloudConfig;
  cfg.deviceName=($('cloud-device')?$('cloud-device').value:'').trim();
  cfg.autoSync=$('cloud-auto')?$('cloud-auto').value==='1':false;
  if(cfg.provider==='firebase'){
    cfg.fbApiKey=($('cloud-fb-apikey')?$('cloud-fb-apikey').value:'').trim();
    cfg.fbProjectId=($('cloud-fb-projid')?$('cloud-fb-projid').value:'').trim();
    cfg.fbUrl=($('cloud-fb-url')?$('cloud-fb-url').value:'').trim().replace(/\/$/,'');
    cfg.fbAuthDomain=($('cloud-fb-auth')?$('cloud-fb-auth').value:'').trim();
    cfg.fbStorageBucket=($('cloud-fb-bucket')?$('cloud-fb-bucket').value:'').trim();
    cfg.fbAppId=($('cloud-fb-appid')?$('cloud-fb-appid').value:'').trim();
    cfg.enabled=!!(cfg.fbApiKey&&cfg.fbProjectId&&cfg.fbUrl);
    _fbApp=null;_fbDb=null;
  }else if(cfg.provider==='jsonbin'){
    cfg.jbKey=($('cloud-jb-key')?$('cloud-jb-key').value:'').trim();
    cfg.jbBinId=($('cloud-jb-bin')?$('cloud-jb-bin').value:'').trim();
    cfg.enabled=!!cfg.jbKey;
  }
  saveState();updateCloudStatus();toast('✅ 雲端設定已儲存');
};

window.openBackupManager=function(){
  // Scan all auto-backups in localStorage
  var backups=[];
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(k&&k.startsWith('hm_autobackup_')){
      try{
        var d=JSON.parse(localStorage.getItem(k));
        var date=k.replace('hm_autobackup_','');
        var size=localStorage.getItem(k).length;
        backups.push({key:k,date:date,ts:d.ts||'',size:size,hasData:!!(d.data&&d.data.ings)});
      }catch(e){backups.push({key:k,date:k.replace('hm_autobackup_',''),ts:'',size:0,hasData:false})}
    }
  }
  backups.sort(function(a,b){return b.date.localeCompare(a.date)});
  
  var html=mH('💾 備份管理中心');
  
  // Current status
  html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">';
  html+='<div style="background:#DFF5EC;border-radius:8px;padding:12px;text-align:center"><div style="font-size:0.8rem;color:#064535;margin-bottom:4px">自動備份</div><div style="font-size:1.2rem;font-weight:700;color:#0A5A46">'+backups.length+' 份</div><div style="font-size:0.78rem;color:#706E68">保留最近 7 天</div></div>';
  html+='<div style="background:#FFF4E0;border-radius:8px;padding:12px;text-align:center"><div style="font-size:0.8rem;color:#6B3A00;margin-bottom:4px">最新備份</div><div style="font-size:0.92rem;font-weight:700;color:#7A4D0B">'+(backups.length?backups[0].date:'無')+'</div><div style="font-size:0.78rem;color:#706E68">'+(backups.length?backups[0].ts.slice(11,19):'')+'</div></div>';
  html+='<div style="background:#E6F1FB;border-radius:8px;padding:12px;text-align:center"><div style="font-size:0.8rem;color:#0C447C;margin-bottom:4px">佔用空間</div><div style="font-size:0.92rem;font-weight:700;color:#1455A0">'+fmt(backups.reduce(function(s,b){return s+b.size},0)/1024,0)+' KB</div><div style="font-size:0.78rem;color:#706E68">localStorage</div></div>';

window.restoreAutoBackup=function(key){
  try{
    var raw=localStorage.getItem(key);
    if(!raw){toast('❌ 備份不存在','err');return}
    var backup=JSON.parse(raw);
    if(!backup.data||!backup.data.ings){toast('❌ 備份資料異常','err');return}
    var date=key.replace('hm_autobackup_','');
    if(!confirm('確定還原到 '+date+' 的備份？\n\n⚠️ 目前資料將被覆蓋\n（建議先點「📸 立即備份」保存目前狀態）'))return;
    
    var savedCloud=JSON.parse(JSON.stringify(state.cloudConfig||{}));
    var savedUsers=JSON.parse(JSON.stringify(state.users||[]));
    
    Object.keys(backup.data).forEach(function(k){
      if(k!=='cloudConfig'&&k!=='page')state[k]=backup.data[k];
    });
    state.cloudConfig=savedCloud;
    if(!state.users||!state.users.length)state.users=savedUsers;
    
    saveState();
    addAudit('還原自動備份',date);
    saveState();
    closeModal();
    renderPage();
    toast('✅ 已還原到 '+date+' 的備份');
  }catch(e){toast('❌ 還原失敗：'+e.message,'err')}
};

window.downloadAutoBackup=function(key,date){
  try{
    var raw=localStorage.getItem(key);
    if(!raw){toast('❌ 備份不存在','err');return}
    var blob=new Blob([raw],{type:'application/json'});
    var a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='好洺ERP自動備份_'+date+'.json';
    a.click();
    toast('✅ 備份已下載');
  }catch(e){toast('❌ 下載失敗','err')}
};

window.manualAutoBackup=function(){
  var key='hm_autobackup_'+toDay()+'_'+new Date().toISOString().slice(11,19).replace(/:/g,'');
  try{
    localStorage.setItem(key,JSON.stringify({ts:new Date().toISOString(),data:state}));
    addAudit('手動備份','');
    saveState();
    toast('✅ 備份完成');
    closeModal();
    openBackupManager();
  }catch(e){toast('❌ 備份失敗（空間不足）','err')}
};

window.clearAutoBackups=function(){
  if(!confirm('確定清除所有自動備份？'))return;
  if(!confirm('再次確認：此操作不可逆'))return;
  var count=0;
  var keys=[];
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(k&&k.startsWith('hm_autobackup_'))keys.push(k);
  }
  keys.forEach(function(k){localStorage.removeItem(k);count++});
  toast('✅ 已清除 '+count+' 份自動備份');
  closeModal();
  openBackupManager();
};

// ↩️ 上一步 / 下一步（Undo / Redo）
// ══════════════════════════════════════════════════════
var _undoStack=[];
var _redoStack=[];
var _maxUndo=30;
var _undoLock=false;

function pushUndo(){
  if(_undoLock)return;
  try{
    var snap=JSON.stringify(state);
    if(_undoStack.length>0&&_undoStack[_undoStack.length-1]===snap)return;
    _undoStack.push(snap);
    if(_undoStack.length>_maxUndo)_undoStack.shift();
    _redoStack=[];
    updateUndoBtns();
  }catch(e){}
}

window.doUndo=function(){
  if(_undoStack.length<2){toast('已到最早狀態');return}
  _undoLock=true;
  try{
    var current=_undoStack.pop();
    _redoStack.push(current);
    var prev=_undoStack[_undoStack.length-1];
    var restored=JSON.parse(prev);
    var savedCloud=JSON.parse(JSON.stringify(state.cloudConfig||{}));
    var savedPage=state.page;
    Object.keys(restored).forEach(function(k){
      if(k!=='cloudConfig'&&k!=='page'&&k!=='currentUser')state[k]=restored[k];
    });
    state.cloudConfig=savedCloud;
    state.page=savedPage;
    localStorage.setItem(COST_KEY,JSON.stringify(state));
    renderPage();
    updateUndoBtns();
    toast('↩️ 已復原上一步');
  }catch(e){toast('復原失敗','err')}
  _undoLock=false;
};

window.doRedo=function(){
  if(!_redoStack.length){toast('已到最新狀態');return}
  _undoLock=true;
  try{
    var next=_redoStack.pop();
    _undoStack.push(next);
    var restored=JSON.parse(next);
    var savedCloud=JSON.parse(JSON.stringify(state.cloudConfig||{}));
    var savedPage=state.page;
    Object.keys(restored).forEach(function(k){
      if(k!=='cloudConfig'&&k!=='page'&&k!=='currentUser')state[k]=restored[k];
    });
    state.cloudConfig=savedCloud;
    state.page=savedPage;
    localStorage.setItem(COST_KEY,JSON.stringify(state));
    renderPage();
    updateUndoBtns();
    toast('↪️ 已重做下一步');
  }catch(e){toast('重做失敗','err')}
  _undoLock=false;
};

function updateUndoBtns(){
  var ub=document.getElementById('undo-btn');
  var rb=document.getElementById('redo-btn');
  var ct=document.getElementById('undo-count');
  if(ub)ub.style.opacity=_undoStack.length>1?'1':'0.35';
  if(rb)rb.style.opacity=_redoStack.length>0?'1':'0.35';
  if(ct)ct.textContent=(_undoStack.length-1)+'/'+_maxUndo;
}

// Ctrl+Z / Ctrl+Y keyboard shortcuts
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){e.preventDefault();doUndo()}
  if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.key==='z'&&e.shiftKey))){e.preventDefault();doRedo()}
});

function buildExcelSheet(key,data){
  if(typeof XLSX==='undefined')return null;
  var catDef=getCatDef(key);
  if(!catDef)return null;
  var cols=catDef.cols;
  
  // Build AOA (Array of Arrays) for full control
  var aoa=[];
  // Row 0: Chinese headers
  aoa.push(cols.map(function(c){return c.n}));
  // Row 1: English keys (grey background, for import mapping)
  aoa.push(cols.map(function(c){return c.k}));
  // Data rows
  (data||[]).forEach(function(item){
    aoa.push(cols.map(function(c){
      var val=item[c.k];
      if(typeof val==='object'&&val!==null)return JSON.stringify(val);
      if(val===undefined||val===null)return '';
      return val;
    }));
  });
  
  // Add empty rows for new data entry (up to row 60)
  var totalRows=Math.max(aoa.length,60);
  while(aoa.length<totalRows)aoa.push(cols.map(function(){return ''}));
  
  var ws=XLSX.utils.aoa_to_sheet(aoa);
  
  // Column widths
  ws['!cols']=cols.map(function(c){
    var w=Math.max(c.n.length*2+2,8);
    if(c.k==='name'||c.k==='itemName'||c.k==='addr'||c.k==='items'||c.k==='note')w=22;
    if(c.k==='id')w=8;
    if(c.k==='phone')w=16;
    return{wch:w};
  });
  
  return ws;
}

function addDataValidations(wb,sheetName,catDef){
  var ws=wb.Sheets[sheetName];
  if(!ws||!catDef)return;

  if(!optWs)return;

  var optRange=XLSX.utils.decode_range(optWs['!ref']||'A1');
  for(var c=optRange.s.c;c<=optRange.e.c;c++){
    var cell=optWs[XLSX.utils.encode_cell({r:0,c:c})];
    if(cell)optHeaders.push({col:c,name:cell.v||''});
  }
  
  var ddMap={
    'supTypes':'supTypes','payTerms':'payTerms','cats':'cats','units':'units',
    'forms':'forms','lossReasons':'lossReasons','lossHandles':'lossHandles',
    '_stores':'_stores'
  };
  var listMap={
    '申請中,已核准,已下單,已到貨,已取消':'採購狀態',
    '未付款,已付款':'帳款狀態',

    '合約,報價單':'合約類型',
    '有效,草稿,已到期':'合約狀態',
    '外觀/包裝完整,溫度合規,效期確認,數量核對,氣味/色澤,重量抽驗,全項檢驗':'品管項目',

    '待確認,已完成,已取消':'調撥狀態',
    '06:00-09:00 早班,09:00-12:00 上午,13:00-17:00 下午,17:00-21:00 晚班':'排程時段',
    '待生產,生產中,已完成,已取消':'排程狀態',
    '老闆,店長,員工':'角色',
    'true,false':'啟用',
    '食材,包材':'門市庫存類別',
    '批發,零售':'來源',
    'CCP1-原料驗收,CCP2-冷藏溫度,CCP3-烹調中心溫度,CCP4-冷卻速度,CCP5-成品保存,CCP6-運輸溫度':'HACCP管制點',
    '符合,偏離,不符合':'HACCP判定'
  };
  
  var validations=[];
  catDef.cols.forEach(function(col,colIdx){
    var optColName=null;
    if(col.dd){optColName=ddMap[col.dd]||col.dd}
    else if(col.ddList){
      var joinedKey=col.ddList.join(',');
      optColName=listMap[joinedKey];
    }
    if(!optColName)return;
    
    // Find the column in options sheet
    var optCol=optHeaders.find(function(h){return h.name===optColName});
    if(!optCol)return;
    
    // Count how many values in that column
    var valCount=0;
    for(var r=1;r<=50;r++){
      var cell=optWs[XLSX.utils.encode_cell({r:r,c:optCol.col})];
      if(cell&&cell.v)valCount=r;
    }
    if(!valCount)return;
    
    var optColLetter=XLSX.utils.encode_col(optCol.col);
    var dataColLetter=XLSX.utils.encode_col(colIdx);
    
    // Add validation for rows 3-60 (skip header rows 1-2)
    validations.push({
      sqref:dataColLetter+'3:'+dataColLetter+'60',
      type:'list',
      formula1:'選項參考!$'+optColLetter+'$2:$'+optColLetter+'$'+(valCount+1)
    });
  });
  
  if(validations.length)ws['!dataValidation']=validations;
}

window.importExcelFile=function(input){
  if(!input.files||!input.files[0])return;
  if(typeof XLSX==='undefined'){toast('⛔ XLSX 函式庫未載入','err');return}
  var file=input.files[0];
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:'array'});
      var validKeys=['sups','ings','storeInv','buyLog','recipes','menu','waste','poList','apList','batchList','contracts','qcRecords','equipment','transfers','prodLog','prodSchedule','users','haccpLogs','internalProducts','internalOrders','arList','countList','returnList','workOrders','customers','custOrders','assets','salesData'];
      var imported=[];var skipped=[];
      
      wb.SheetNames.forEach(function(origName){
        // origName = Excel 工作表名稱(中文或英文皆可),用於拿 wb.Sheets[]
        // stateKey = 對應到 state 內部欄位的英文 key,用於 state[stateKey]=data
        var stateKey=SHEET_EN[origName]||origName;
        if(validKeys.indexOf(stateKey)<0){skipped.push(origName);return}
        var ws=wb.Sheets[origName];
        if(!ws){skipped.push(origName+' (找不到工作表)');return}
        var rawData=XLSX.utils.sheet_to_json(ws,{header:1});
        if(rawData.length<3){skipped.push(origName+' (不足3行)');return}

        // Row 0 = Chinese headers, Row 1 = English keys, Row 2+ = data
        var cnHeaders=rawData[0];
        var enKeys=rawData[1];

        // Validate: check if row 2 looks like English keys
        var isNewFormat=enKeys&&enKeys.some&&enKeys.some(function(k){return typeof k==='string'&&/^[a-zA-Z]/.test(k)});

        var data;
        if(isNewFormat){
          // New format: row 1=cn, row 2=en keys, row 3+=data
          data=[];
          for(var r=2;r<rawData.length;r++){
            var row={};var hasValue=false;
            enKeys.forEach(function(key,i){
              if(!key)return;
              var val=rawData[r]?rawData[r][i]:undefined;
              if(val!==undefined&&val!==null&&val!==''){hasValue=true}
              row[key]=val!==undefined?val:'';
            });
            if(hasValue)data.push(row);
          }
        }else{
          // Legacy format: row 1=keys, row 2+=data (fallback)
          data=XLSX.utils.sheet_to_json(ws);
        }

        if(!data.length){skipped.push(origName+' (空)');return}

        // Parse JSON strings, auto-generate IDs
        data=data.map(function(row){
          Object.keys(row).forEach(function(k){
            if(typeof row[k]==='string'&&(row[k].startsWith('[')||row[k].startsWith('{'))){
              try{row[k]=JSON.parse(row[k])}catch(e){}
            }
            // Convert 'true'/'false' strings
            if(row[k]==='true')row[k]=true;
            if(row[k]==='false')row[k]=false;
          });
          if(!row.id||String(row.id).trim()===''){
            var prefix=stateKey==='sups'?'S':stateKey==='ings'?'I':stateKey==='users'?'U':'';
            if(prefix){row.id=nxtId(data.filter(function(r){return r.id}),prefix)}
            else{row.id=stateKey.slice(0,2).toUpperCase()+Date.now()+Math.random().toString(36).slice(2,5)}
          }
          return row;
        });

        state[stateKey]=data;
        imported.push((SHEET_CN[stateKey]||stateKey)+' ('+data.length+'筆)');
      });
      
      if(imported.length){
        saveState();renderPage();closeModal();
        var msg='✅ 匯入成功：\n'+imported.join('\n');
        if(skipped.length)msg+='\n\n跳過：'+skipped.join(', ');
        alert(msg);toast('✅ 已匯入 '+imported.length+' 個類別');
      }else{
        alert('⚠️ 未找到可匯入的資料\n\n工作表名稱須為（中文或英文皆可）：\n'+validKeys.map(function(k){return(SHEET_CN[k]||k)+' ('+k+')'}).join(', ')+'\n\n目前工作表：'+wb.SheetNames.join(', '));
      }
    }catch(err){toast('❌ 匯入失敗：'+err.message,'err')}
    input.value='';
  };
  reader.readAsArrayBuffer(file);
};



// 固形物成本計算
function getSolidPrice(ing){
  if(!ing.totalWeight||!ing.solidWeight||!ing.price)return ing.price||0;
  var solidRatio=ing.solidWeight/ing.totalWeight;
  return ing.price/solidRatio;
}
function getSolidRatio(ing){
  if(!ing.totalWeight||!ing.solidWeight)return 1;
  return ing.solidWeight/ing.totalWeight;
}

window.showStoreCostReport=function(){

window.refreshStoreCostReport=function(){
var el=$('scr-content');if(!el)return;
var mon=$('scr-mon')?$('scr-mon').value:toMon();
var orders=(state.internalOrders||[]).filter(function(o){return o.date&&o.date.startsWith(mon)&&o.status!=='已取消'});
var stores=state.meta.stores||['交大店','竹北店','台積電店'];

var html='<div style="display:grid;grid-template-columns:repeat('+stores.length+',1fr);gap:8px;margin:14px 0">';
stores.forEach(function(store){
  var so=orders.filter(function(o){return o.store===store});
  var rev=so.reduce(function(s,o){return s+(o.totalAmt||0)},0);
  var cost=so.reduce(function(s,o){return s+(o.totalCost||0)},0);
  html+='<div class="metric"><div class="metric-label">'+esc(store)+'</div><div class="metric-val" style="font-size:1.1rem">'+CUR()+fmt(rev,0)+'</div><div class="metric-sub">成本'+CUR()+fmt(cost,0)+' / '+so.length+'單</div></div>';
});
html+='</div>';

// Detail by product
var productTotals={};
orders.forEach(function(o){(o.items||[]).forEach(function(it){
  var key=it.name+'|'+o.store;
  if(!productTotals[key])productTotals[key]={name:it.name,store:o.store,qty:0,cost:0,sell:0};
  productTotals[key].qty+=it.qty;
  productTotals[key].cost+=it.subtotalCost;
  productTotals[key].sell+=it.subtotalSell;
})});

var rows=Object.values(productTotals).sort(function(a,b){return b.sell-a.sell});
if(rows.length){
html+='<table class="tbl"><thead><tr><th>品名</th><th>門市</th><th>總數量</th><th>總成本</th><th>總售額</th><th>毛利</th></tr></thead><tbody>';
rows.forEach(function(r){
  var margin=r.sell>0?Math.round((r.sell-r.cost)/r.sell*100):0;
  html+='<tr><td style="font-weight:700">'+esc(r.name)+'</td><td>'+esc(r.store)+'</td><td>'+fmt(r.qty,1)+'</td><td>'+CUR()+fmt(r.cost,0)+'</td><td style="font-weight:700;color:#7A4D0B">'+CUR()+fmt(r.sell,0)+'</td><td style="color:'+(margin>=0?'#0A5A46':'#B82525')+';font-weight:700">'+CUR()+fmt(r.sell-r.cost,0)+' ('+margin+'%)</td></tr>';
});
var totalCost=rows.reduce(function(s,r){return s+r.cost},0);
var totalSell=rows.reduce(function(s,r){return s+r.sell},0);
html+='<tr style="border-top:2px solid #1E1E1C;font-weight:700"><td colspan="3">合計</td><td>'+CUR()+fmt(totalCost,0)+'</td><td style="color:#7A4D0B">'+CUR()+fmt(totalSell,0)+'</td><td style="color:#0A5A46">'+CUR()+fmt(totalSell-totalCost,0)+' ('+Math.round((totalSell-totalCost)/totalSell*100)+'%)</td></tr>';
html+='</tbody></table>'}
else{html+='<div style="text-align:center;color:#706E68;padding:20px">'+mon+' 尚無出貨資料</div>'}

el.innerHTML=html};

window.exportStoreCostReport=function(){
if(typeof XLSX==='undefined'){toast('XLSX 未載入','err');return}
var mon=$('scr-mon')?$('scr-mon').value:toMon();
var orders=(state.internalOrders||[]).filter(function(o){return o.date&&o.date.startsWith(mon)&&o.status!=='已取消'});

var aoa=[
  ['好洺餐飲事業有限公司 — 門市進貨成本報表'],
  ['期間',mon],
  [],
  ['出貨日期','門市','品名','類型','規格','數量','單位','成本單價','售價單價','小計成本','小計售價','毛利']
];
orders.forEach(function(o){(o.items||[]).forEach(function(it){
  aoa.push([o.date,o.store,it.name,it.type,it.spec||'',it.qty,it.unit,it.cost,it.sellPrice,it.subtotalCost,it.subtotalSell,it.subtotalSell-it.subtotalCost]);
})});
aoa.push([]);
var totalCost=orders.reduce(function(s,o){return s+o.totalCost},0);
var totalSell=orders.reduce(function(s,o){return s+o.totalAmt},0);
aoa.push(['','','','','','','','','合計',totalCost,totalSell,totalSell-totalCost]);

window.createCount=function(){var ings=state.ings||[];if(!ings.length){toast('無食材可盤點');return}

var c={id:'CT'+Date.now(),date:toDay(),counter:(state.currentUser||{}).name||'',items:items,status:'盤點中',note:''};

window.openCountEdit=function(id){var c=(state.countList||[]).find(function(x){return x.id===id});if(!c)return;
var html=mH('📋 盤點作業 — '+esc(c.date));
html+='<div style="max-height:450px;overflow-y:auto"><table class="tbl"><thead><tr><th>食材</th><th>帳面數量</th><th>實際數量</th><th>差異</th></tr></thead><tbody>';
c.items.forEach(function(it,idx){html+='<tr><td style="font-weight:600">'+esc(it.name)+' ('+esc(it.unit)+')</td><td>'+fmt(it.sysQty,2)+'</td><td><input type="number" step="0.1" class="ct-act" data-idx="'+idx+'" value="'+(it.actQty!==null?it.actQty:'')+'" placeholder="填入" style="width:80px;border:1.5px solid #D6D4CC;border-radius:6px;padding:5px;text-align:center;font-size:0.9rem" oninput="calcCountDiff(this,'+idx+',\''+id+'\')"></td><td class="ct-diff-'+idx+'" style="font-weight:700">'+(it.diff>0?'<span style="color:#0A5A46">+'+fmt(it.diff,2)+'</span>':it.diff<0?'<span style="color:#B82525">'+fmt(it.diff,2)+'</span>':'—')+'</td></tr>'});

html+='<div class="save-btns"><button class="btn btn-outline" onclick="closeModal()">暫存</button><button class="btn btn-primary" onclick="submitCount(\''+id+'\')">提交盤點（待核准）</button></div>';

window.calcCountDiff=function(inp,idx,cid){var c=(state.countList||[]).find(function(x){return x.id===cid});if(!c)return;
var act=parseFloat(inp.value);c.items[idx].actQty=isNaN(act)?null:act;c.items[idx].diff=isNaN(act)?0:act-c.items[idx].sysQty;
var el=document.querySelector('.ct-diff-'+idx);if(el){var d=c.items[idx].diff;el.innerHTML=d>0?'<span style="color:#0A5A46">+'+fmt(d,2)+'</span>':d<0?'<span style="color:#B82525">'+fmt(d,2)+'</span>':'—'}saveState()};

window.submitCount=function(id){var c=(state.countList||[]).find(function(x){return x.id===id});if(!c)return;
var unfilled=c.items.filter(function(i){return i.actQty===null}).length;
if(unfilled>0&&!confirm('有 '+unfilled+' 項未填，確定提交？'))return;
c.status='待核准';addAudit('提交盤點',c.items.length+'項');saveState();closeModal();renderPage();toast('✅ 盤點已提交')};

window.approveCount=function(id){if(!confirm('核准後將自動調整庫存，確定？'))return;

c.items.forEach(function(it){if(it.actQty===null)return;var ing=state.ings.find(function(i){return i.id===it.id});if(ing){ing.stock=it.actQty;ing.updatedAt=toDay()}});

window.receivePO=function(poId){var p=(state.poList||[]).find(function(x){return x.id===poId});if(!p)return;

if(!state.buyLog)state.buyLog=[];
state.buyLog.push({id:'BUY'+Date.now(),date:toDay(),supId:p.supplier,ingName:p.itemName,qty:p.qty||0,unit:p.unit||'',unitPrice:p.unitPrice||0,total:p.totalAmt||(p.qty*p.unitPrice)||0,docNo:'PO-'+p.id.slice(-6),store:'中央廚房'});
// 建立應付帳款
if(!state.apList)state.apList=[];
state.apList.push({id:'AP'+Date.now(),date:toDay(),supplier:p.supplier,itemName:p.itemName,amount:p.totalAmt||(p.qty*p.unitPrice)||0,dueDate:'',status:'未付款',paidDate:'',note:'來源：採購單 '+p.id.slice(-6)});
// 更新採購單狀態
p.status='已到貨';p.receivedDate=toDay();
addAudit('採購收貨連動',p.itemName);saveState();closeModal();renderPage();toast('✅ 收貨完成：進貨記錄+應付帳款已建立')};

window.showReorderSuggestion=function(){var ings=state.ings||[];
var suggestions=ings.filter(function(i){return i.stock<=i.safety*1.2}).map(function(i){
  var sup=(state.sups||[]).find(function(s){return s.id===i.sup});
  var avgDaily=i.safety>0?i.safety/7:1;
  var leadDays=sup?sup.days||3:3;
  var sugQty=Math.ceil((i.safety*2-i.stock)+avgDaily*leadDays);
  return{id:i.id,name:i.name,unit:i.unit,stock:i.stock,safety:i.safety,price:i.price,sup:sup?sup.name:'未指定',leadDays:leadDays,sugQty:Math.max(sugQty,1),sugAmt:Math.max(sugQty,1)*i.price}
}).sort(function(a,b){return a.stock/a.safety-b.stock/b.safety});
var html=mH('📦 訂購建議');
if(!suggestions.length){html+='<div style="text-align:center;padding:24px;color:#0A5A46">✅ 所有食材庫存充足，目前不需要補貨</div>'}
else{var totalAmt=suggestions.reduce(function(s,i){return s+i.sugAmt},0);
html+='<div style="margin-bottom:12px;font-size:0.88rem;color:#706E68">共 '+suggestions.length+' 項需補貨，建議採購金額 <b style="color:#B82525">'+CUR()+fmt(totalAmt,0)+'</b></div>';
html+='<div style="max-height:400px;overflow-y:auto"><table class="tbl"><thead><tr><th>食材</th><th>現有</th><th>安全量</th><th>建議訂購</th><th>供應商</th><th>交期</th><th>預估金額</th><th>操作</th></tr></thead><tbody>';
suggestions.forEach(function(i){var pct=i.safety>0?Math.round(i.stock/i.safety*100):0;
html+='<tr><td style="font-weight:700">'+esc(i.name)+'</td><td style="color:'+(pct<=50?'#B82525':'#9A6210')+';font-weight:700">'+fmt(i.stock,1)+' '+esc(i.unit)+'</td><td>'+fmt(i.safety,0)+'</td><td style="font-weight:700;color:#0A5A46">'+fmt(i.sugQty,0)+' '+esc(i.unit)+'</td><td>'+esc(i.sup)+'</td><td>'+i.leadDays+'天</td><td>'+CUR()+fmt(i.sugAmt,0)+'</td><td><button class="btn btn-sm btn-primary" onclick="createPOFromSug(\''+i.id+'\','+i.sugQty+')">建立採購</button></td></tr>'});
html+='</tbody></table></div>'}
html+='<div class="save-btns"><button class="btn btn-outline" onclick="closeModal()">關閉</button></div>';
modal(html,true)};

window.createPOFromSug=function(ingId,qty){var ing=state.ings.find(function(i){return i.id===ingId});if(!ing)return;
var sup=(state.sups||[]).find(function(s){return s.id===ing.sup});
if(!state.poList)state.poList=[];
state.poList.push({id:'PO'+Date.now(),date:toDay(),supplier:sup?sup.name:'',requester:(state.currentUser||{}).name||'',itemName:ing.name,qty:qty,unit:ing.unit,unitPrice:ing.price,totalAmt:qty*ing.price,status:'申請中',note:'系統建議補貨'});

function renderCostAnalysis(){var pg=dv({});var sw=sopBox('cost-analysis');if(sw)pg.appendChild(sw);
pg.appendChild(dv({cls:'page-title'},'📈 成本分析報表'));
var buys=state.buyLog||[];var months={};
buys.forEach(function(b){if(!b.date)return;var m=b.date.slice(0,7);if(!months[m])months[m]={total:0,count:0};months[m].total+=b.total||0;months[m].count++});
var sortedM=Object.keys(months).sort();
pg.appendChild(dv({cls:'card',html:'<div class="card-title">📊 月度進貨成本趨勢</div><div style="height:250px;display:flex;align-items:flex-end;gap:6px;padding:10px 0">'+
(sortedM.length?sortedM.map(function(m){var maxV=Math.max.apply(null,sortedM.map(function(k){return months[k].total}));var h=maxV>0?Math.max(months[m].total/maxV*200,20):20;
return'<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="background:#0A5A46;width:100%;height:'+h+'px;border-radius:4px 4px 0 0;min-width:30px"></div><div style="font-size:0.72rem;font-weight:700;color:#0A5A46">'+CUR()+fmt(months[m].total/1000,0)+'K</div><div style="font-size:0.7rem;color:#706E68">'+m.slice(5)+'月</div></div>'}).join(''):'<div style="flex:1;text-align:center;color:#706E68;padding:40px">尚無進貨資料</div>')+'</div>'}));

// 供應商成本佔比
var supCost={};buys.forEach(function(b){var key=b.supId||'未知';supCost[key]=(supCost[key]||0)+(b.total||0)});
var supSorted=Object.entries(supCost).sort(function(a,b){return b[1]-a[1]}).slice(0,10);
var totalCost=supSorted.reduce(function(s,e){return s+e[1]},0);
pg.appendChild(dv({cls:'card',html:'<div class="card-title">🏪 供應商成本佔比（前10）</div>'+
(supSorted.length?supSorted.map(function(e){var pct=totalCost>0?e[1]/totalCost*100:0;return'<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px"><div style="width:120px;font-size:0.84rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(e[0])+'</div><div style="flex:1;height:20px;background:#F3F1EB;border-radius:4px;overflow:hidden"><div style="width:'+pct+'%;height:100%;background:#0A5A46;border-radius:4px"></div></div><div style="min-width:80px;text-align:right;font-size:0.84rem;font-weight:700">'+CUR()+fmt(e[1],0)+'</div><div style="min-width:40px;text-align:right;font-size:0.78rem;color:#706E68">'+fmt(pct,1)+'%</div></div>'}).join(''):'<div style="color:#706E68;padding:20px;text-align:center">尚無資料</div>')+'</div>'}));

// 門市成本比較
var storeCost={};(state.internalOrders||[]).forEach(function(o){if(!o.store||o.status==='已取消')return;storeCost[o.store]=(storeCost[o.store]||0)+(o.totalCost||0)});
if(Object.keys(storeCost).length){
pg.appendChild(dv({cls:'card',html:'<div class="card-title">🏬 門市進貨成本比較</div><div class="grid3">'+Object.entries(storeCost).map(function(e){return'<div class="metric"><div class="metric-label">'+esc(e[0])+'</div><div class="metric-val" style="font-size:1.2rem">'+CUR()+fmt(e[1],0)+'</div></div>'}).join('')+'</div>'}));}
return pg}

window.showSupplierEval=function(){var sups=state.sups||[];var buys=state.buyLog||[];var qc=state.qcRecords||[];var returns=state.returnList||[];
var evals=sups.map(function(s){
  var myBuys=buys.filter(function(b){return b.supId===s.id});
  var myQC=qc.filter(function(q){return q.supplier===s.name||q.supplier===s.id});
  var myRtn=returns.filter(function(r){return r.supplier===s.name});
  var totalAmt=myBuys.reduce(function(sum,b){return sum+(b.total||0)},0);
  var qcPass=myQC.filter(function(q){return q.result==='合格'}).length;
  var qcRate=myQC.length?Math.round(qcPass/myQC.length*100):100;
  var rtnRate=myBuys.length?Math.round(myRtn.length/myBuys.length*100):0;
  return{id:s.id,name:s.name,buyCount:myBuys.length,totalAmt:totalAmt,qcCount:myQC.length,qcRate:qcRate,rtnCount:myRtn.length,rtnRate:rtnRate,score:s.score||0}
}).filter(function(e){return e.buyCount>0}).sort(function(a,b){return b.totalAmt-a.totalAmt});
var html=mH('📊 供應商評核報告');
html+='<div style="max-height:450px;overflow-y:auto"><table class="tbl"><thead><tr><th>供應商</th><th>進貨次數</th><th>總金額</th><th>品管次數</th><th>合格率</th><th>退貨次數</th><th>退貨率</th><th>綜合評分</th></tr></thead><tbody>';
evals.forEach(function(e){var overall=Math.round((e.qcRate*0.4+(100-e.rtnRate)*0.3+Math.min(e.score*10,100)*0.3));
html+='<tr><td style="font-weight:700">'+esc(e.name)+'</td><td>'+e.buyCount+'</td><td>'+CUR()+fmt(e.totalAmt,0)+'</td><td>'+e.qcCount+'</td><td style="color:'+(e.qcRate>=90?'#0A5A46':'#B82525')+';font-weight:700">'+e.qcRate+'%</td><td>'+e.rtnCount+'</td><td style="color:'+(e.rtnRate<=5?'#0A5A46':'#B82525')+'">'+e.rtnRate+'%</td><td style="font-weight:700;color:'+(overall>=80?'#0A5A46':overall>=60?'#9A6210':'#B82525')+'">'+overall+'/100</td></tr>'});
if(!evals.length)html+='<tr><td colspan="8" style="text-align:center;color:#706E68">尚無供應商進貨資料</td></tr>';
html+='</tbody></table></div><div class="save-btns"><button class="btn btn-outline" onclick="closeModal()">關閉</button></div>';
modal(html,true)};

window.saveWO=function(eid){var r=state.recipes.find(function(x){return x.id===($('wo-recipe')?$('wo-recipe').value:'')});
var obj={id:eid||'WO'+Date.now(),date:$('wo-date')?$('wo-date').value:toDay(),recipeName:r?r.name:'',recipeId:r?r.id:'',multiplier:+($('wo-mult')?$('wo-mult').value:1)||1,output:+($('wo-output')?$('wo-output').value:0)||0,unit:$('wo-unit')?$('wo-unit').value:'份',assignee:$('wo-assign')?$('wo-assign').value:'',status:'待領料',note:$('wo-note')?$('wo-note').value:'',pickedAt:'',startedAt:'',completedAt:''};
if(!state.workOrders)state.workOrders=[];
if(eid){state.workOrders=state.workOrders.map(function(x){return x.id===eid?obj:x})}else{state.workOrders.push(obj)}

window.woPickMaterial=function(id){var w=(state.workOrders||[]).find(function(x){return x.id===id});if(!w)return;
var r=(state.recipes||[]).find(function(x){return x.id===w.recipeId});
if(!r||!r.ings||!r.ings.length){toast('此配方無食材明細');w.status='已領料';w.pickedAt=new Date().toISOString();saveState();renderPage();return}
// 扣減庫存
var issues=[];
r.ings.forEach(function(ri){var ing=(state.ings||[]).find(function(i){return i.id===ri.id||i.name===ri.name});
if(!ing){issues.push(ri.name+' 找不到');return}
var need=(ri.qty||0)*w.multiplier;
if(ing.stock<need)issues.push(ing.name+' 不足(需'+fmt(need,1)+'/有'+fmt(ing.stock,1)+')');
else{ing.stock-=need;ing.updatedAt=toDay()}});
if(issues.length&&!confirm('以下食材有問題：\n'+issues.join('\n')+'\n\n仍要繼續領料？'))return;
w.status='已領料';w.pickedAt=new Date().toISOString();
addAudit('工單領料',w.recipeName);saveState();renderPage();toast('✅ 已領料，庫存已扣減')};

window.checkPerm=function(module,op){
  if(!state.currentUser)return false;
  var role=state.currentUser.role;
  if(role==='老闆')return true;
  var perms=state.permissions||{};
  var rolePerms=perms[role]||[];
  // 舊版相容：如果只有模組名字串陣列
  if(rolePerms.length&&typeof rolePerms[0]==='string')return rolePerms.indexOf(module)>=0;
  // 新版：物件 {module:'xxx',ops:['view','add',...]}
  var mp=rolePerms.find(function(p){return typeof p==='object'&&p.module===module});
  if(!mp)return false;
  return(mp.ops||[]).indexOf(op)>=0;
};

window.autoDeductStock=function(recipeId,multiplier){
  var recipe=(state.recipes||[]).find(function(r){return r.id===recipeId});
  if(!recipe||!recipe.ings)return{success:false,issues:[]};
  var issues=[];
  recipe.ings.forEach(function(ri){
    var ing=(state.ings||[]).find(function(i){return i.id===ri.id||i.name===ri.name});
    if(!ing){issues.push({name:ri.name||ri.id,issue:'找不到食材'});return}
    var need=(ri.qty||0)*multiplier;
    if(ing.stock<need){issues.push({name:ing.name,issue:'不足(需'+fmt(need,1)+'/有'+fmt(ing.stock,1)+')'});return}
    ing.stock=Math.max(0,ing.stock-need);
    ing.updatedAt=toDay();
    // 更新批號效期
    if(state.batchList){
      var batches=state.batchList.filter(function(b){return b.itemName===ing.name&&b.status!=='已用完'}).sort(function(a,b){return(a.expiryDate||'9').localeCompare(b.expiryDate||'9')});
      var remain=need;
      batches.forEach(function(b){if(remain<=0)return;var deduct=Math.min(b.remainQty||0,remain);b.remainQty=(b.remainQty||0)-deduct;remain-=deduct;if(b.remainQty<=0)b.status='已用完'});
    }
  });
  return{success:issues.length===0,issues:issues};
};

window.parsePOSFile=function(input){if(!input.files||!input.files[0])return;
if(typeof XLSX==='undefined'){toast('XLSX 未載入','err');return}
var reader=new FileReader();
reader.onload=function(e){
  var wb=XLSX.read(e.target.result,{type:'array'});
  var ws=wb.Sheets[wb.SheetNames[0]];
  var data=XLSX.utils.sheet_to_json(ws);
  if(!data.length){toast('檔案為空');return}
  // Auto-detect columns
  var sample=data[0];var keys=Object.keys(sample);
  var dateCol=keys.find(function(k){return/日期|date/i.test(k)})||keys[0];
  var nameCol=keys.find(function(k){return/品名|商品|item|name/i.test(k)})||keys[1];
  var amtCol=keys.find(function(k){return/金額|amount|total|price|營收/i.test(k)})||keys[2];
  var qtyCol=keys.find(function(k){return/數量|qty|quantity/i.test(k)});
  var storeCol=keys.find(function(k){return/門市|store|shop/i.test(k)});
  var payCol=keys.find(function(k){return/付款|payment|支付/i.test(k)});
  
  var imported=0;
  if(!state.salesData)state.salesData=[];
  data.forEach(function(row){
    var amt=parseFloat(row[amtCol])||0;if(!amt)return;
    var dateVal=row[dateCol]||'';
    if(typeof dateVal==='number'){var d=XLSX.SSF.parse_date_code(dateVal);if(d)dateVal=d.y+'-'+String(d.m).padStart(2,'0')+'-'+String(d.d).padStart(2,'0')}
    state.salesData.push({id:'SL'+Date.now()+imported,date:String(dateVal).slice(0,10),itemName:String(row[nameCol]||''),amount:amt,qty:qtyCol?parseFloat(row[qtyCol])||1:1,store:storeCol?String(row[storeCol]||''):'',payMethod:payCol?String(row[payCol]||''):''});
    imported++;
  });
  addAudit('匯入POS資料',imported+'筆');saveState();closeModal();renderPage();
  toast('✅ 已匯入 '+imported+' 筆銷售資料');
};reader.readAsArrayBuffer(input.files[0]);input.value=''};

html+='</div></div>';

function getSelectedStore(id){const sel=$(id+'_storesel');if(!sel)return'交大店';if(sel.value==='_other')return $(id+'_customstore')?.value||'自訂門市';return sel.value}
function onStoreChange(id){const sel=$(id+'_storesel');$(id+'_customstorefield').style.display=sel.value==='_other'?'block':'none';if(sel.value!=='_other')updateStoreHeader(id,sel.value)}
function onCustomStore(id){updateStoreHeader(id,$(id+'_customstore')?.value||'自訂門市')}
function onOrderTypeChange(id){const type=$(id+'_ordertype')?.value||'叫貨';const badge=$(id+'_typebadge');if(badge){badge.textContent=type;badge.style.color=type==='補貨'?'var(--teal)':'var(--amber)'}const th=$(id+'_storeth');if(th)th.innerHTML=getSelectedStore(id)+'<br><span style="font-size:0.72rem;opacity:.7">'+type+'量</span>'}
function updateStoreHeader(id,name){const type=$(id+'_ordertype')?.value||'叫貨';const th=$(id+'_storeth');if(th)th.innerHTML=name+'<br><span style="font-size:0.72rem;opacity:.7">'+type+'量</span>';const sig=$(id+'_siglabel');if(sig)sig.textContent=name+' 收貨'}
function calcAmt(id,seq,price){const inp=$(id+'_qty_'+seq+'_0');const amt=$(id+'_amt_'+seq);const val=parseFloat(inp.value)||0;inp.classList.toggle('has-value',val>0);amt.textContent=val>0?'$'+Math.round(val*price).toLocaleString():'—';updateTotals(id);scheduleAutoSave(id)}
function updateTotals(id){const s=SHEETS.find(x=>x.id===id);let total=0;s.items.forEach(item=>{total+=(parseFloat($(id+'_qty_'+item.seq+'_0')?.value)||0)*item.price});const gt=$(id+'_grandtotal');if(gt)gt.textContent='$'+Math.round(total).toLocaleString();if(currentSheetIdx===SHEETS.findIndex(x=>x.id===id))$('pageTotal').textContent='$'+Math.round(total).toLocaleString()}
function switchTab(idx){document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===idx));document.querySelectorAll('.sheet').forEach((s,i)=>s.classList.toggle('active',i===idx));currentSheetIdx=idx;updateTotals(SHEETS[idx].id)}
function resetCurrentSheet(){if(!confirm('確定要清除所有已填數量？'))return;const s=SHEETS[currentSheetIdx];s.items.forEach(item=>{const inp=$(s.id+'_qty_'+item.seq+'_0');if(inp){inp.value='';inp.classList.remove('has-value')}const amt=$(s.id+'_amt_'+item.seq);if(amt)amt.textContent='—';const lk=$(s.id+'_lack_'+item.seq);if(lk)lk.value='';const rp=$(s.id+'_repl_'+item.seq);if(rp)rp.value=''});document.querySelectorAll('#sheet_'+s.id+' .note-input').forEach(el=>el.value='');updateTotals(s.id)}

// Auto-save & Storage
const autoSaveTimers={};
function scheduleAutoSave(id){clearTimeout(autoSaveTimers[id]);autoSaveTimers[id]=setTimeout(()=>{const d=$(id+'_date0')?.value||new Date().toISOString().slice(0,10);saveToStorage(id,d);if(currentSheetIdx===SHEETS.findIndex(x=>x.id===id))showStatus('已自動儲存')},800)}
function showStatus(msg){const el=$('autoSaveStatus');if(el){el.textContent=msg;setTimeout(()=>el.textContent='',3000)}}
function storageKey(id,d){return PREFIX+id+'_'+d}
function loadFromStorage(id,d){const r=localStorage.getItem(storageKey(id,d));return r?JSON.parse(r):null}
function saveToStorage(id,dateStr){const s=SHEETS.find(x=>x.id===id);const data={savedAt:new Date().toISOString(),date:dateStr,store:getSelectedStore(id),orderType:$(id+'_ordertype')?.value||'叫貨',person:$(id+'_person')?.value||'',qtys:{},notes:{}};s.items.forEach(item=>{const v=$(id+'_qty_'+item.seq+'_0')?.value||'';if(v)data.qtys[item.seq+'_0']=v;const lk=$(id+'_lack_'+item.seq)?.value||'';if(lk)data.qtys['lack_'+item.seq]=lk;const rp=$(id+'_repl_'+item.seq)?.value||'';if(rp)data.qtys['repl_'+item.seq]=rp;const noteEl=document.querySelector('#'+id+'_tbody tr:nth-child('+item.seq+') .note-input');if(noteEl?.value)data.notes[item.seq]=noteEl.value});localStorage.setItem(storageKey(id,dateStr),JSON.stringify(data));return data}
function applyData(id,data){if(!data)return;const s=SHEETS.find(x=>x.id===id);const OPTS=['交大店','竹北店','台積電店'];if(data.store){const sel=$(id+'_storesel');if(sel){if(OPTS.includes(data.store)){sel.value=data.store}else{sel.value='_other';$(id+'_customstorefield').style.display='block';$(id+'_customstore').value=data.store}updateStoreHeader(id,data.store)}}if(data.orderType){const sel=$(id+'_ordertype');if(sel){sel.value=data.orderType;onOrderTypeChange(id)}}if(data.person){const p=$(id+'_person');if(p)p.value=data.person}s.items.forEach(item=>{const inp=$(id+'_qty_'+item.seq+'_0');if(!inp)return;const v=data.qtys?.[item.seq+'_0']||'';inp.value=v;inp.classList.toggle('has-value',!!v&&parseFloat(v)>0);const amt=$(id+'_amt_'+item.seq);if(amt){const n=parseFloat(v)||0;amt.textContent=n>0?'$'+Math.round(n*item.price).toLocaleString():'—'}const lk=$(id+'_lack_'+item.seq);if(lk&&data.qtys?.['lack_'+item.seq])lk.value=data.qtys['lack_'+item.seq];const rp=$(id+'_repl_'+item.seq);if(rp&&data.qtys?.['repl_'+item.seq])rp.value=data.qtys['repl_'+item.seq];if(data.notes?.[item.seq]){const n=document.querySelector('#'+s.id+'_tbody tr:nth-child('+item.seq+') .note-input');if(n)n.value=data.notes[item.seq]}});updateTotals(id)}
function manualSave(){const s=SHEETS[currentSheetIdx];const dateStr=$(s.id+'_date0')?.value||new Date().toISOString().slice(0,10);const data=saveToStorage(s.id,dateStr);const filled=Object.values(data.qtys).filter(v=>parseFloat(v)>0);showToast(filled.length>0?'已儲存 '+dateStr+' 紀錄（'+filled.length+' 項）':'尚未填寫任何數量')}
function showToast(msg){const t=$('saveToast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

<script>
