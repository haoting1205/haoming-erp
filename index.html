(function(){
  'use strict';

  if(window.HaomingTax){
    console.log('[稅務升級] 已套用過,跳過');
    return;
  }

  function bootUpgrade(){
    if(typeof state==='undefined' || typeof DB_INGS==='undefined' ||
       typeof renderTax==='undefined' || typeof renderIng==='undefined' ||
       typeof renderBuy==='undefined' || typeof renderAP==='undefined' ||
       typeof openIngModal==='undefined' || typeof openBuyModal==='undefined' ||
       typeof saveBuy==='undefined' || typeof saveIng==='undefined' ||
       typeof receivePO==='undefined'){
      setTimeout(bootUpgrade, 250);
      return;
    }
    runUpgrade();
  }

  function runUpgrade(){
    console.log('🔧 [生管 v2.1.0] 開始套用稅務升級...');

    // ═══════════════════════════════════════════════════════════
    // STEP 1: 注入 HaomingTax 模組
    // ═══════════════════════════════════════════════════════════
    const TAX_TYPES = {
      taxable:    { rate: 0.05, label: '應稅 5%',  emoji: '💰', color: '#9A6210' },
      tax_free:   { rate: 0,    label: '免稅',     emoji: '🌾', color: '#0A5A46' },
      zero_rated: { rate: 0,    label: '零稅率',   emoji: '⚡', color: '#1455A0' }
    };

    // 30 項食材稅別預設（系統推斷+保守原則）
    const ING_TAX_PATCH = {
      // 免稅 11 項
      'I003': 'tax_free',  // 高麗菜（蔬菜）
      'I004': 'tax_free',  // 白米（稻米）
      'I010': 'tax_free',  // 洋蔥（蔬菜）
      'I011': 'tax_free',  // 雞蛋（生鮮蛋）
      'I013': 'tax_free',  // 番茄（蔬菜）
      'I024': 'tax_free',  // 大蒜（蔬菜）
      'I089': 'tax_free',  // 老薑（蔬菜）
      'I094': 'tax_free',  // 大辣椒（蔬菜）
      'I118': 'tax_free',  // 紅蘿蔔（蔬菜）
      'I125': 'tax_free',  // 杏鮑菇（菇蔬）
      // 應稅 19 項
      'I002': 'taxable',   // 鮭魚片（分切包裝）
      'I005': 'taxable',   // 雞胸肉（分切包裝）
      'I006': 'taxable',   // 豆腐（加工品）
      'I007': 'taxable',   // 蝦仁（加工品）
      'I008': 'taxable',   // 醬油（調味料）
      'I009': 'taxable',   // 玄米油（食用油）
      'I012': 'taxable',   // 麵粉（加工品）
      'I014': 'taxable',   // 牛里肌（分切）
      'I015': 'taxable',   // 奶油（乳製品）
      'I023': 'taxable',   // 雞腿排（分切）
      'I025': 'taxable',   // 沙拉油（食用油）
      'I041': 'taxable',   // 豬梅花肉片
      'I044': 'taxable',   // 芝麻香油
      'I080': 'taxable',   // 三層肉
      'I083': 'taxable',   // 醬油膏
      'I087': 'taxable',   // 酸菜絲
      'I090': 'taxable',   // 二砂
      'I092': 'taxable',   // 蘿蔔乾（醃漬加工）
      'I111': 'taxable',   // 豬絞肉
      'I129': 'taxable'    // 鮪魚罐頭
    };

    /**
     * 依食材推斷稅別（fallback 規則）
     */
    function inferIngTaxType(ing){
      if(!ing) return { type: 'taxable', reason: '預設應稅' };
      const id = ing.id || '';
      if(ING_TAX_PATCH[id]) {
        return {
          type: ING_TAX_PATCH[id],
          reason: '系統內建判定'
        };
      }
      const name = ing.name || '';
      const cat = ing.cat || '';
      // 蔬菜類預設免稅
      if(cat === '蔬菜' || /蔬菜|青菜|果菜/.test(name)){
        return { type: 'tax_free', reason: '生鮮蔬菜（免稅）' };
      }
      // 穀物類：稻米免稅,其他應稅
      if(cat === '穀物' && /米$|稻|糙米/.test(name)){
        return { type: 'tax_free', reason: '稻米（免稅）' };
      }
      // 蛋類：生鮮免稅
      if(cat === '蛋類' && /雞蛋|鴨蛋|生鮮/.test(name) && !/-應稅|加工|滷|皮蛋/.test(name)){
        return { type: 'tax_free', reason: '生鮮蛋（免稅）' };
      }
      // 預設應稅
      return { type: 'taxable', reason: '加工/調味/包裝品（應稅）' };
    }

    /**
     * 依供應商推斷預設「報價是否含稅」
     */
    function inferSupPriceIncludesTax(sup){
      if(!sup) return false;
      const name = sup.name || '';
      // 福聯/沁味 → 含稅報價（依過往備註）
      if(/福聯|沁味/.test(name)) return true;
      // 預設未稅
      return false;
    }

    function getIngTaxType(ing){
      if(ing && ing.taxType) return ing.taxType;
      return inferIngTaxType(ing).type;
    }

    function getTaxBadge(ing){
      const t = getIngTaxType(ing);
      const info = TAX_TYPES[t] || TAX_TYPES.taxable;
      return { type: t, rate: info.rate, label: info.label,
               emoji: info.emoji, color: info.color };
    }

    /**
     * 計算單筆進貨的稅務拆分
     * @param {Object} ing - 食材物件
     * @param {Object} sup - 供應商物件
     * @param {Number} qty - 進貨數量
     * @param {Number} unitPrice - 單價
     * @param {Boolean} priceIncludesTax - 報價是否含稅（覆蓋預設）
     * @returns {Object} { netAmt, taxAmt, grossAmt, taxType, priceIncludesTax }
     */
    function calcBuyTax(ing, sup, qty, unitPrice, priceIncludesTax){
      qty = +qty || 0;
      unitPrice = +unitPrice || 0;
      const taxType = getIngTaxType(ing);
      const rate = TAX_TYPES[taxType] ? TAX_TYPES[taxType].rate : 0;
      const incl = priceIncludesTax !== undefined ? priceIncludesTax
        : (sup && sup.priceIncludesTax !== undefined ? sup.priceIncludesTax
           : inferSupPriceIncludesTax(sup));

      let netAmt, taxAmt, grossAmt;
      if(rate === 0){
        // 免稅
        netAmt = qty * unitPrice;
        taxAmt = 0;
        grossAmt = netAmt;
      } else if(incl){
        // 含稅報價：反算
        grossAmt = qty * unitPrice;
        netAmt = Math.round(grossAmt / (1 + rate) * 100) / 100;
        taxAmt = Math.round((grossAmt - netAmt) * 100) / 100;
      } else {
        // 未稅報價：加稅
        netAmt = qty * unitPrice;
        taxAmt = Math.round(netAmt * rate * 100) / 100;
        grossAmt = Math.round((netAmt + taxAmt) * 100) / 100;
      }
      return { netAmt, taxAmt, grossAmt, taxType, priceIncludesTax: incl, rate };
    }

    /**
     * 對 buyLog 計算稅務統計
     */
    function calcBuyLogSummary(buyLogList){
      let totalGross = 0, totalNet = 0, totalTax = 0, totalFree = 0;
      const byTaxType = { taxable: 0, tax_free: 0 };
      const byVendor = {};
      const byIng = {};

      (buyLogList || []).forEach(b => {
        const gross = +b.total || 0;
        const taxType = b.taxType || 'taxable';
        const incl = b.priceIncludesTax !== undefined ? b.priceIncludesTax : false;
        const rate = TAX_TYPES[taxType] ? TAX_TYPES[taxType].rate : 0;

        let net, tax;
        if(rate === 0){ net = gross; tax = 0; }
        else if(incl){ net = Math.round(gross/(1+rate)*100)/100; tax = gross - net; }
        else {
          // 未稅報價：gross 應該已經是含稅的（如果有正確存）
          // 為了相容舊資料，假設 b.total 是「含稅後總額」
          net = b.netAmt !== undefined ? b.netAmt : Math.round(gross/(1+rate)*100)/100;
          tax = b.taxAmt !== undefined ? b.taxAmt : (gross - net);
        }

        totalGross += gross;
        totalNet += net;
        totalTax += tax;
        if(taxType === 'tax_free') totalFree += gross;
        byTaxType[taxType] = (byTaxType[taxType] || 0) + gross;

        const vname = (state.sups||[]).find(s => s.id === b.supId);
        const vkey = vname ? vname.name : (b.supId || '未知');
        if(!byVendor[vkey]) byVendor[vkey] = { net:0, tax:0, gross:0, count:0 };
        byVendor[vkey].net += net;
        byVendor[vkey].tax += tax;
        byVendor[vkey].gross += gross;
        byVendor[vkey].count++;

        const ikey = b.ingName || '未知';
        if(!byIng[ikey]) byIng[ikey] = { net:0, tax:0, gross:0, count:0, taxType };
        byIng[ikey].net += net;
        byIng[ikey].tax += tax;
        byIng[ikey].gross += gross;
        byIng[ikey].count++;
      });

      const round = n => Math.round(n*100)/100;
      return {
        totalGross: round(totalGross),
        totalNet: round(totalNet),
        totalTax: round(totalTax),
        totalFree: round(totalFree),
        byTaxType, byVendor, byIng
      };
    }

    // 對外 API
    window.HaomingTax = {

      if(!name){ alert('請填入食材名稱'); return; }

      const taxType = document.getElementById('fi-tax')?.value || 'taxable';
      const taxNote = document.getElementById('fi-taxnote')?.value || '';
      const obj = {
        id, name,
        cat: document.getElementById('fi-cat')?.value || '其他',
        unit: document.getElementById('fi-unit')?.value || '公斤',

        stock: +document.getElementById('fi-stock')?.value || 0,
        safety: +document.getElementById('fi-safety')?.value || 0,
        kcal: +document.getElementById('fi-kcal')?.value || 0,
        prot: +document.getElementById('fi-prot')?.value || 0,
        fat: +document.getElementById('fi-fat')?.value || 0,
        carb: +document.getElementById('fi-carb')?.value || 0,
        sodium: +document.getElementById('fi-sodium')?.value || 0,
        totalWeight: +document.getElementById('fi-tw')?.value || 0,
        solidWeight: +document.getElementById('fi-sw')?.value || 0,
        taxType,
        taxNote,
        taxConfirmed: true,  // 老闆手動儲存就視為已確認
        updatedAt: toDay()
      };
      if(eid) state.ings = state.ings.map(x => x.id === eid ? obj : x);
      else state.ings.push(obj);
      addAudit(eid ? '編輯食材' : '新增食材', name + ' (' + (TAX_TYPES[taxType]||{}).label + ')');
      saveState();
      closeModal();
      renderPage();
      toast('✅ ' + name + ' 已儲存');
    };

    // ═══════════════════════════════════════════════════════════
    // STEP 10 & 11: 包裝 openBuyModal + saveBuy — 進貨即時稅算

    const _origOpenBuyModal = window.openBuyModal;
    window.openBuyModal = function(supId){
      _origOpenBuyModal(supId);
      setTimeout(() => {
        // 在「合計」欄位後插入稅務即時計算區
        const totalField = document.getElementById('b-total');
        if(!totalField) return;
        const totalRow = totalField.closest('.form-row');
        if(!totalRow || document.getElementById('b-tax-calc-wrap')) return;

        // 增加「報價方式」切換 + 稅務計算顯示區
        const taxBox = document.createElement('div');
        taxBox.id = 'b-tax-calc-wrap';
        taxBox.innerHTML =
          '<div class="form-row c2" style="margin-top:8px">' +
          '<div class="fg"><label>報價方式</label><select id="b-incl">' +
          '<option value="0">📋 未稅報價（廠商發票分列稅額）</option>' +
          '<option value="1">💸 含稅報價（廠商開出含稅總額）</option>' +
          '</select></div>' +
          '<div class="fg"><label>稅別（依食材自動帶入）</label>' +
          '<input id="b-taxtype-display" disabled style="background:var(--g100);font-weight:700"></div>' +
          '</div>' +
          '<div id="b-tax-calc" class="buy-tax-calc">' +
          '<div class="buy-tax-calc-cell net"><div class="lbl">未稅金額</div><div class="val" id="b-net">—</div></div>' +
          '<div class="buy-tax-calc-cell tax"><div class="lbl">稅額（5%）</div><div class="val" id="b-tax">—</div></div>' +
          '<div class="buy-tax-calc-cell gross"><div class="lbl">含稅總額</div><div class="val" id="b-gross">—</div></div>' +
          '</div>';
        totalRow.insertAdjacentElement('afterend', taxBox);

        // 設定預設值（依供應商）
        const supSelect = document.getElementById('b-sup');
        const updateInclFromSup = () => {
          const sId = supSelect?.value;
          const sup = (state.sups||[]).find(s => s.id === sId);
          const inclSelect = document.getElementById('b-incl');
          if(inclSelect && sup){
            inclSelect.value = sup.priceIncludesTax ? '1' : '0';
          }
          recalcBuyTax();
        };
        supSelect?.addEventListener('change', updateInclFromSup);

        // 食材變更時更新稅別顯示
        const ingSelect = document.getElementById('b-ing');
        const updateTaxTypeDisplay = () => {
          const sl = ingSelect;
          if(!sl) return;
          const opt = sl.options[sl.selectedIndex];
          const ingId = opt?.getAttribute('data-id');
          const ing = (state.ings||[]).find(i => i.id === ingId || i.name === sl.value);
          const display = document.getElementById('b-taxtype-display');
          if(display && ing){
            const badge = HaomingTax.getTaxBadge(ing);
            display.value = badge.emoji + ' ' + badge.label;
            display.style.color = badge.color;
          } else if(display){
            display.value = '— 請先選擇食材 —';
            display.style.color = 'var(--g400)';
          }
          recalcBuyTax();
        };
        ingSelect?.addEventListener('change', updateTaxTypeDisplay);

        // 數量/單價/合計變更 → 重算稅
        ['b-qty','b-price','b-total','b-incl'].forEach(fid => {
          const el = document.getElementById(fid);
          if(el) el.addEventListener('input', recalcBuyTax);
        });

        // 初次設定
        updateInclFromSup();
        updateTaxTypeDisplay();
      }, 50);
    };

    function recalcBuyTax(){
      const ingSel = document.getElementById('b-ing');
      const opt = ingSel?.options[ingSel.selectedIndex];
      const ingId = opt?.getAttribute('data-id');
      const ing = (state.ings||[]).find(i => i.id === ingId || i.name === ingSel?.value);
      const sup = (state.sups||[]).find(s => s.id === document.getElementById('b-sup')?.value);
      const qty = +document.getElementById('b-qty')?.value || 0;
      const unitPrice = +document.getElementById('b-price')?.value || 0;
      let total = +document.getElementById('b-total')?.value || 0;
      const incl = document.getElementById('b-incl')?.value === '1';

      if(!ing || !qty){
        const setT = (id, v) => { const el = document.getElementById(id); if(el) el.textContent = v; };
        setT('b-net', '—'); setT('b-tax', '—'); setT('b-gross', '—');
        return;
      }

      // 自動填合計（如果空）
      if(!total && unitPrice){
        total = qty * unitPrice;
        const totalEl = document.getElementById('b-total');
        if(totalEl && !totalEl.value) totalEl.value = total;
      }

      const calc = HaomingTax.calcBuyTax(ing, sup, qty, unitPrice, incl);
      const NF = v => CUR() + ' ' + fmt(v, 1);
      const setT = (id, v) => { const el = document.getElementById(id); if(el) el.textContent = v; };
      setT('b-net', NF(calc.netAmt));
      setT('b-tax', calc.taxAmt > 0 ? NF(calc.taxAmt) : '— 免稅');
      setT('b-gross', NF(calc.grossAmt));
    }

    const _origSaveBuy = window.saveBuy;
    window.saveBuy = function(){
      const sl = document.getElementById('b-ing');
      const ingName = sl?.value;
      if(!ingName){ alert('請選擇食材'); return; }
      const op = sl.options[sl.selectedIndex];
      const ingId = op?.getAttribute('data-id') || '';
      const ing = (state.ings||[]).find(i => i.id === ingId || i.name === ingName);
      const sup = (state.sups||[]).find(s => s.id === document.getElementById('b-sup')?.value);
      const qty = +document.getElementById('b-qty')?.value || 0;
      if(!qty){ alert('請填入數量'); return; }
      const unitPrice = +document.getElementById('b-price')?.value || 0;
      const total = +document.getElementById('b-total')?.value || qty * unitPrice;
      const incl = document.getElementById('b-incl')?.value === '1';
      const calc = HaomingTax.calcBuyTax(ing || {}, sup, qty, unitPrice, incl);

      const entry = {
        id: 'B' + Date.now(),
        date: document.getElementById('b-date')?.value || toDay(),
        ingName,
        ingId,
        supId: document.getElementById('b-sup')?.value || '',
        qty,
        unit: document.getElementById('b-unit')?.value || '公斤',
        unitPrice,
        total,                   // 含稅總額（保持原行為）
        invoice: document.getElementById('b-inv')?.value || '',
        // ─── 新增稅務欄位 ───
        taxType: calc.taxType,
        priceIncludesTax: incl,
        netAmt: calc.netAmt,
        taxAmt: calc.taxAmt,
        grossAmt: calc.grossAmt
      };
      state.buyLog.push(entry);

      if(document.getElementById('b-update')?.value === 'yes'){
        const found = state.ings.find(i => i.id === ingId || i.name === ingName);
        if(found){
          found.stock = (found.stock || 0) + qty;
          if(unitPrice) found.price = unitPrice;
          found.updatedAt = toDay();
        }
      }
      addAudit('登錄進貨', ingName + ' ' + qty + '（稅 ' + CUR() + fmt(calc.taxAmt, 0) + '）');
      saveState();
      closeModal();
      renderPage();
      toast('✅ 進貨記錄已儲存（含稅 ' + CUR() + fmt(total, 0) +
            '，未稅 ' + CUR() + fmt(calc.netAmt, 0) + '）');
    };
    console.log('  ✅ openBuyModal/saveBuy 已包裝');

    // ═══════════════════════════════════════════════════════════
    // STEP 12: 包裝 receivePO — 採購收貨自動算稅
    // ═══════════════════════════════════════════════════════════
    const _origReceivePO = window.receivePO;
    window.receivePO = function(id){
      const p = (state.poList||[]).find(x => x.id === id);
      if(!p) return _origReceivePO(id);
      // 計算稅務（依品項與供應商）
      const ing = (state.ings||[]).find(i => i.name === p.itemName);
      const sup = (state.sups||[]).find(s => s.name === p.supplier);
      const incl = sup ? !!sup.priceIncludesTax : false;
      const calc = HaomingTax.calcBuyTax(ing || {}, sup, p.qty || 0, p.unitPrice || 0, incl);

      // 保留原邏輯（更新狀態）
      p.status = '已到貨';
      p.receivedDate = toDay();
      // 加稅務欄位
      p.taxType = calc.taxType;
      p.priceIncludesTax = incl;
      p.netAmt = calc.netAmt;
      p.taxAmt = calc.taxAmt;

      // 建立應付帳款（加稅務欄位）
      if(!state.apList) state.apList = [];
      state.apList.push({
        id: 'AP' + Date.now(),
        poId: p.id,
        date: p.receivedDate,
        supplier: p.supplier,
        itemName: p.itemName,
        amount: p.totalAmt,
        status: '未付款',
        dueDate: '',
        note: '自動由採購單產生',
        // ─── 稅務欄位 ───
        taxType: calc.taxType,
        priceIncludesTax: incl,
        netAmt: calc.netAmt,
        taxAmt: calc.taxAmt
      });

      addAudit('到貨驗收', p.itemName + '（稅 ' + CUR() + fmt(calc.taxAmt, 0) + '）');
      saveState();
      renderPage();
      toast('✅ 已驗收，應付帳款已自動建立（含稅務拆分）');
    };

    const _origRenderAP = window.renderAP;
    window.renderAP = function(){
      const pg = _origRenderAP();
      // 在 AP 表格的「金額」欄位旁加稅務徽章 + 點擊展開拆分
      setTimeout(() => {
        const tables = document.querySelectorAll('#cost-content table');
        tables.forEach(tbl => {
          const headRow = tbl.querySelector('thead tr');
          if(!headRow) return;
          const headers = [...headRow.querySelectorAll('th')].map(th => th.textContent);
          const amtIdx = headers.findIndex(h => /金額/.test(h));
          if(amtIdx < 0) return;
          // 確認是 AP 表格（看「到期日」欄）
          if(!headers.some(h => /到期日/.test(h))) return;
          const dataRows = tbl.querySelectorAll('tbody tr');
          dataRows.forEach((tr, idx) => {
            const cells = tr.querySelectorAll('td');
            const amtCell = cells[amtIdx];
            if(!amtCell || amtCell.querySelector('.tax-badge')) return;
            const list = state.apList || [];
            // 反向（因為 AP 渲染時用 .reverse()）
            const ap = list[list.length - 1 - idx];
            if(!ap || !ap.taxType) return;
            const badge = HaomingTax.getTaxBadge({ taxType: ap.taxType });
            const span = document.createElement('span');
            span.className = 'tax-badge tax-mini tax-' + badge.type;
            span.textContent = badge.emoji + ' ' + badge.label;
            span.style.marginLeft = '6px';
            amtCell.appendChild(span);
            // 加稅務拆分明細（在金額下方）
            if(ap.netAmt !== undefined && ap.taxAmt > 0){
              const detail = document.createElement('div');
              detail.style.cssText = 'font-size:0.74rem;color:var(--g400);margin-top:2px';
              detail.textContent = '未稅 ' + CUR() + fmt(ap.netAmt, 0) +
                ' + 稅 ' + CUR() + fmt(ap.taxAmt, 0);
              amtCell.appendChild(detail);
            }
          });
        });
      }, 60);
      return pg;
    };
